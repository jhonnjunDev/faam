<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://htfhfutjhlqktbzjbiuc.supabase.co wss://htfhfutjhlqktbzjbiuc.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com;">
  <title>Novo Paciente - FAAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-pagina="paciente-novo" data-titulo="Novo Paciente" data-breadcrumb='<a href="dashboard.html">Dashboard</a> / <a href="pacientes.html">Pacientes</a> / Novo'>

  <div class="app-layout">
    <main class="main-content">
      <div class="content-area fade-in">
        <form id="formPaciente">
          <!-- Dados Pessoais -->
          <div class="form-card mb-3">
            <h3><i class="fas fa-user"></i> Dados Pessoais</h3>
            <div class="info-grid">
              <div class="mb-1">
                <label class="form-label">Nome Completo *</label>
                <input type="text" class="form-control" id="nome" required>
              </div>
              <div class="mb-1">
                <label class="form-label">CPF</label>
                <input type="text" class="form-control" id="cpf" maxlength="14" placeholder="000.000.000-00">
              </div>
              <div class="mb-1">
                <label class="form-label">Data de Nascimento *</label>
                <input type="date" class="form-control" id="data_nascimento" required>
              </div>
              <div class="mb-1">
                <label class="form-label">Sexo *</label>
                <select class="form-select" id="sexo" required>
                  <option value="">Selecione</option>
                  <option value="M">Masculino</option>
                  <option value="F">Feminino</option>
                </select>
              </div>
              <div class="mb-1">
                <label class="form-label">Estado Civil</label>
                <select class="form-select" id="estado_civil">
                  <option value="">Selecione</option>
                  <option value="Solteiro(a)">Solteiro(a)</option>
                  <option value="Casado(a)">Casado(a)</option>
                  <option value="Viúvo(a)">Viúvo(a)</option>
                  <option value="Divorciado(a)">Divorciado(a)</option>
                  <option value="União Estável">União Estável</option>
                </select>
              </div>
              <div class="mb-1">
                <label class="form-label">Naturalidade</label>
                <input type="text" class="form-control" id="naturalidade" placeholder="Cidade, UF">
              </div>
              <div class="mb-1">
                <label class="form-label">Nome do Pai</label>
                <input type="text" class="form-control" id="nome_pai">
              </div>
              <div class="mb-1">
                <label class="form-label">Nome da Mãe</label>
                <input type="text" class="form-control" id="nome_mae">
              </div>
              <div class="mb-1">
                <label class="form-label">CNS (Cartão Nacional de Saúde)</label>
                <input type="text" class="form-control" id="cns" maxlength="15" placeholder="000 0000 0000 0000">
              </div>
            </div>
          </div>

          <!-- Endereço -->
          <div class="form-card mb-3">
            <h3><i class="fas fa-map-marker-alt"></i> Endereço</h3>
            <div class="info-grid">
              <div class="mb-1">
                <label class="form-label">Rua / Avenida</label>
                <input type="text" class="form-control" id="endereco_rua">
              </div>
              <div class="mb-1">
                <label class="form-label">Bairro</label>
                <input type="text" class="form-control" id="endereco_bairro">
              </div>
              <div class="mb-1">
                <label class="form-label">Cidade</label>
                <input type="text" class="form-control" id="endereco_cidade">
              </div>
              <div class="mb-1">
                <label class="form-label">Município de Residência</label>
                <input type="text" class="form-control" id="municipio_residencia">
              </div>
              <div class="mb-1">
                <label class="form-label">CEP</label>
                <input type="text" class="form-control" id="endereco_cep" maxlength="9" placeholder="00000-000">
              </div>
            </div>
          </div>

          <!-- Contato de Emergência -->
          <div class="form-card mb-3">
            <h3><i class="fas fa-phone-alt"></i> Contato de Emergência</h3>
            <div class="info-grid">
              <div class="mb-1">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" id="contato_nome">
              </div>
              <div class="mb-1">
                <label class="form-label">Parentesco</label>
                <input type="text" class="form-control" id="contato_parentesco" placeholder="Ex: Filho(a), Esposa">
              </div>
              <div class="mb-1">
                <label class="form-label">Telefone</label>
                <input type="text" class="form-control" id="contato_telefone" maxlength="15">
              </div>
            </div>
          </div>

          <!-- Internação -->
          <div class="form-card mb-3">
            <h3><i class="fas fa-bed"></i> Dados de Internação</h3>
            <div class="info-grid">
              <div class="mb-1">
                <label class="form-label">Data de Entrada *</label>
                <input type="date" class="form-control" id="data_entrada" required>
              </div>
              <div class="mb-1">
                <label class="form-label">Quarto</label>
                <input type="text" class="form-control" id="quarto" placeholder="Ex: 101">
              </div>
              <div class="mb-1">
                <label class="form-label">Tipo de Acomodação</label>
                <select class="form-select" id="tipo_acomodacao">
                  <option value="">Selecione</option>
                  <option value="Individual">Individual</option>
                  <option value="Enfermaria">Enfermaria</option>
                  <option value="Apartamento">Apartamento</option>
                </select>
              </div>
              <div class="mb-1">
                <label class="form-label">Responsável Legal</label>
                <input type="text" class="form-control" id="responsavel_legal">
              </div>
              <div class="mb-1">
                <label class="form-label">Status</label>
                <select class="form-select" id="status">
                  <option value="ativo">Ativo</option>
                  <option value="alta">Alta</option>
                  <option value="obito">Óbito</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Saúde -->
          <div class="form-card mb-3">
            <h3><i class="fas fa-heartbeat"></i> Condição de Saúde</h3>
            <div class="info-grid">
              <div class="mb-1">
                <label class="form-label">Diagnóstico Principal *</label>
                <input type="text" class="form-control" id="diagnostico_principal" required>
              </div>
              <div class="mb-1">
                <label class="form-label">Diagnósticos Secundários</label>
                <input type="text" class="form-control" id="diagnosticos_secundarios">
              </div>
              <div class="mb-1">
                <label class="form-label">Alergias</label>
                <input type="text" class="form-control" id="alergias" placeholder="Separar por vírgula">
              </div>
              <div class="mb-1">
                <label class="form-label">Medicamentos em Uso</label>
                <textarea class="form-control" id="medicamentos" rows="3" placeholder="Listar medicamentos, doses e frequência"></textarea>
              </div>
              <div class="mb-1">
                <label class="form-label">Medicamento Controlado</label>
                <select class="form-select" id="medicamento_controlado">
                  <option value="nao">Não</option>
                  <option value="sim">Sim</option>
                </select>
              </div>
              <div class="mb-1">
                <label class="form-label">Histórico de Cirurgias</label>
                <textarea class="form-control" id="historico_cirurgias" rows="2"></textarea>
              </div>
              <div class="mb-1">
                <label class="form-label">Internações Anteriores</label>
                <textarea class="form-control" id="historico_internacoes" rows="2"></textarea>
              </div>
              <div class="mb-1">
                <label class="form-label">Doenças Crônicas</label>
                <input type="text" class="form-control" id="doencas_cronicas">
              </div>
              <div class="mb-1">
                <label class="form-label">Dependência Física</label>
                <input type="text" class="form-control" id="dependencia_fisica" placeholder="Ex: Cadeirante, Acamado, Hemiplegia...">
              </div>
              <div class="mb-1">
                <label class="form-label">Grau de Dependência</label>
                <select class="form-select" id="grau_dependencia">
                  <option value="">Selecione</option>
                  <option value="I">I - Parcial</option>
                  <option value="II">II - Moderada</option>
                  <option value="III">III - Total</option>
                </select>
              </div>
              <div class="mb-1">
                <label class="form-label">Diagnóstico (descrição livre)</label>
                <textarea class="form-control" id="diagnostico_livre" rows="4" placeholder="Descreva o diagnóstico detalhado do paciente"></textarea>
              </div>
            </div>
          </div>

          <!-- Acompanhamento -->
          <div class="form-card mb-3">
            <h3><i class="fas fa-stethoscope"></i> Acompanhamento</h3>
            <div class="info-grid">
              <div class="mb-1">
                <label class="form-label">Responsável pelo Acompanhamento</label>
                <input type="text" class="form-control" id="responsavel_acompanhamento">
              </div>
              <div class="mb-1">
                <label class="form-label">Observações</label>
                <textarea class="form-control" id="observacoes" rows="4"></textarea>
              </div>
            </div>
          </div>

          <!-- Botões -->
          <div style="display:flex; gap:12px; justify-content:flex-end;">
            <a href="pacientes.html" class="btn btn-outline">
              <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-primary" id="btnSalvar">
              <i class="fas fa-save"></i> Salvar Paciente
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dados-iniciais.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auditoria.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      function aguardarPronto() {
        if (window.AuthPronto) {
          iniciarPagina();
        } else {
          setTimeout(aguardarPronto, 50);
        }
      }

      async function iniciarPagina() {
        if (!Auth.podeAcessar('paciente_novo')) {
          window.location.href = 'dashboard.html';
          return;
        }

        // Máscara CPF
        document.getElementById('cpf').addEventListener('input', (e) => {
          let v = e.target.value.replace(/\D/g, '').substring(0, 11);
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
          e.target.value = v;
        });

        // Máscara telefone contato
        document.getElementById('contato_telefone').addEventListener('input', (e) => {
          let v = e.target.value.replace(/\D/g, '').substring(0, 11);
          if (v.length === 11) {
            v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
          } else if (v.length === 10) {
            v = v.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
          }
          e.target.value = v;
        });

        // Máscara CEP
        document.getElementById('endereco_cep').addEventListener('input', (e) => {
          let v = e.target.value.replace(/\D/g, '').substring(0, 8);
          v = v.replace(/(\d{5})(\d)/, '$1-$2');
          e.target.value = v;
        });

        // Máscara CNS
        document.getElementById('cns').addEventListener('input', (e) => {
          let v = e.target.value.replace(/\D/g, '').substring(0, 15);
          v = v.replace(/(\d{3})(\d)/, '$1 $2');
          v = v.replace(/(\d{4})(\d)/, '$1 $2');
          v = v.replace(/(\d{4})(\d)/, '$1 $2');
          e.target.value = v;
        });

        let salvando = false;
        document.getElementById('formPaciente').addEventListener('submit', async (e) => {
          e.preventDefault();
          if (salvando) return;
          salvando = true;
          document.getElementById('btnSalvar').disabled = true;

          const dados = {};
          const campos = [
            'nome', 'cpf', 'data_nascimento', 'sexo', 'estado_civil', 'naturalidade',
            'endereco_rua', 'endereco_bairro', 'endereco_cidade', 'municipio_residencia',
            'endereco_cep', 'contato_nome', 'contato_parentesco', 'contato_telefone',
            'data_entrada', 'quarto', 'tipo_acomodacao', 'responsavel_legal', 'status',
            'diagnostico_principal', 'diagnosticos_secundarios', 'alergias', 'medicamentos',
            'medicamento_controlado', 'historico_cirurgias', 'historico_internacoes', 'doencas_cronicas',
            'nome_pai', 'nome_mae', 'cns', 'dependencia_fisica', 'grau_dependencia', 'diagnostico_livre',
            'responsavel_acompanhamento', 'observacoes'
          ];

          campos.forEach(campo => {
            dados[campo] = document.getElementById(campo).value.trim();
          });

          if (!dados.nome || !dados.data_nascimento || !dados.sexo || !dados.data_entrada || !dados.diagnostico_principal) {
            Utils.mostrarToast('Preencha os campos obrigatórios.', 'error');
            salvando = false;
            document.getElementById('btnSalvar').disabled = false;
            return;
          }

          const paciente = await DB.cadastrarPaciente(dados);
          if (!paciente) {
            salvando = false;
            document.getElementById('btnSalvar').disabled = false;
            return;
          }
          Utils.mostrarToast('Paciente cadastrado com sucesso!');
          setTimeout(() => {
            window.location.href = `paciente-ficha.html?id=${paciente.id}`;
          }, 800);
        });
      }

      aguardarPronto();
    });
  </script>
</body>
</html>
