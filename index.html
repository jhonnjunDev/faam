<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://htfhfutjhlqktbzjbiuc.supabase.co wss://htfhfutjhlqktbzjbiuc.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com;">
  <title>FAAM - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-pagina="login" data-titulo="">

  <div class="login-page">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">
          <i class="fas fa-heartbeat"></i>
        </div>
        <h1>FAAM</h1>
        <p>Sistema de Gestão Médica</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm" onsubmit="return false;">
        <div class="mb-2">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="mb-2">
          <label class="form-label">Código de Acesso</label>
          <input type="password" class="form-control" id="codigo" placeholder="• • • • • •" required minlength="6" maxlength="20" style="text-align:center; font-size:20px; letter-spacing:6px; font-weight:700;">
        </div>
        <button type="submit" class="btn btn-primary" id="btnLogin" style="margin-top:12px">
          <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
      </form>

      <div style="text-align:center; margin-top:28px; padding-top:20px; border-top:1px solid #e2e8f0;">
        <p style="font-size:12px; color:#718096;">Desenvolvido por <strong style="color:#1a365d;">Jhonata</strong></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dados-iniciais.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Auth.init() já é chamado pelo auth.js no seu próprio DOMContentLoaded
      // Aguardar um tick para garantir que auth.js já executou
      await new Promise(r => setTimeout(r, 100));

      // Se já autenticado, redirecionar
      if (Auth.estaAutenticado()) {
        window.location.href = 'dashboard.html';
        return;
      }

      // Login
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const codigo = document.getElementById('codigo').value.trim();
        const erroEl = document.getElementById('loginError');
        const btn = document.getElementById('btnLogin');

        if (!email || !codigo) {
          erroEl.textContent = 'Preencha todos os campos.';
          erroEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

        const resultado = await Auth.login(email, codigo);

        if (resultado.sucesso) {
          window.location.href = 'dashboard.html';
        } else {
          erroEl.textContent = resultado.erro;
          erroEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
        }
      });
    });
  </script>
</body>
</html>
