<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://htfhfutjhlqktbzjbiuc.supabase.co wss://htfhfutjhlqktbzjbiuc.supabase.co https://faam-upload.jhonjunn.workers.dev; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://faam-upload.jhonjunn.workers.dev; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://htfhfutjhlqktbzjbiuc.supabase.co https://faam-upload.jhonjunn.workers.dev;">
  <title>Editar Paciente - FAAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-pagina="paciente-editar" data-titulo="Editar Paciente" data-breadcrumb='<a href="dashboard.html">Dashboard</a> / <a href="pacientes.html">Pacientes</a> / Editar'>

  <div class="app-layout">
    <main class="main-content">
      <div class="content-area fade-in" id="conteudo">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Carregando...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dados-iniciais.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auditoria.js"></script>
  <script src="js/r2-upload.js"></script>
  <script>
    function esperar() {
      if (window.AuthPronto) {
        carregar();
      } else {
        setTimeout(esperar, 100);
      }
    }

    async function carregar() {
      const container = document.getElementById('conteudo');

      if (!Auth.estaAutenticado()) {
        window.location.href = 'index.html';
        return;
      }

      if (!Auth.podeAcessar('paciente_editar')) {
        window.location.href = 'dashboard.html';
        return;
      }

      const id = Utils.obterParametroUrl('id');
      if (!id) {
        window.location.href = 'pacientes.html';
        return;
      }

      try {
        const p = await DB.obterPacientePorId(id);
        if (!p) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-user-slash"></i>
              <h3>Paciente não encontrado</h3>
              <a href="pacientes.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Voltar</a>
            </div>`;
          return;
        }

        container.innerHTML = `
          <form id="formEditar" onsubmit="return false;">
            <div class="form-card mb-3">
              <h3><i class="fas fa-user"></i> Dados Pessoais</h3>
              <div class="info-grid">
                <div class="mb-1"><label class="form-label">Nome Completo *</label><input type="text" class="form-control" id="nome" value="${Utils.escapeHtml(p.nome || '')}" required></div>
                <div class="mb-1"><label class="form-label">CPF</label><input type="text" class="form-control" id="cpf" maxlength="14" value="${p.cpf || ''}"></div>
                <div class="mb-1"><label class="form-label">Data de Nascimento *</label><input type="date" class="form-control" id="data_nascimento" value="${p.data_nascimento || ''}" required></div>
                <div class="mb-1"><label class="form-label">Sexo *</label><select class="form-select" id="sexo" required><option value="M" ${p.sexo==='M'?'selected':''}>Masculino</option><option value="F" ${p.sexo==='F'?'selected':''}>Feminino</option></select></div>
                <div class="mb-1"><label class="form-label">Estado Civil</label><select class="form-select" id="estado_civil"><option value="">Selecione</option><option value="Solteiro(a)" ${p.estado_civil==='Solteiro(a)'?'selected':''}>Solteiro(a)</option><option value="Casado(a)" ${p.estado_civil==='Casado(a)'?'selected':''}>Casado(a)</option><option value="Viúvo(a)" ${p.estado_civil==='Viúvo(a)'?'selected':''}>Viúvo(a)</option><option value="Divorciado(a)" ${p.estado_civil==='Divorciado(a)'?'selected':''}>Divorciado(a)</option><option value="União Estável" ${p.estado_civil==='União Estável'?'selected':''}>União Estável</option></select></div>
                <div class="mb-1"><label class="form-label">Naturalidade</label><input type="text" class="form-control" id="naturalidade" value="${Utils.escapeHtml(p.naturalidade || '')}"></div>
                <div class="mb-1"><label class="form-label">Telefone</label><input type="text" class="form-control" id="telefone" maxlength="15" value="${p.telefone || ''}"></div>
                <div class="mb-1"><label class="form-label">E-mail</label><input type="email" class="form-control" id="email" value="${p.email || ''}"></div>
              </div>
            </div>

            <div class="form-card mb-3">
              <h3><i class="fas fa-map-marker-alt"></i> Endereço</h3>
              <div class="info-grid">
                <div class="mb-1"><label class="form-label">Rua / Avenida</label><input type="text" class="form-control" id="endereco_rua" value="${Utils.escapeHtml(p.endereco_rua || '')}"></div>
                <div class="mb-1"><label class="form-label">Bairro</label><input type="text" class="form-control" id="endereco_bairro" value="${Utils.escapeHtml(p.endereco_bairro || '')}"></div>
                <div class="mb-1"><label class="form-label">Cidade</label><input type="text" class="form-control" id="endereco_cidade" value="${Utils.escapeHtml(p.endereco_cidade || '')}"></div>
                <div class="mb-1"><label class="form-label">CEP</label><input type="text" class="form-control" id="endereco_cep" maxlength="9" value="${p.endereco_cep || ''}"></div>
              </div>
            </div>

            <div class="form-card mb-3">
              <h3><i class="fas fa-phone-alt"></i> Contato de Emergência</h3>
              <div class="info-grid">
                <div class="mb-1"><label class="form-label">Nome</label><input type="text" class="form-control" id="contato_nome" value="${Utils.escapeHtml(p.contato_nome || '')}"></div>
                <div class="mb-1"><label class="form-label">Parentesco</label><input type="text" class="form-control" id="contato_parentesco" value="${Utils.escapeHtml(p.contato_parentesco || '')}"></div>
                <div class="mb-1"><label class="form-label">Telefone</label><input type="text" class="form-control" id="contato_telefone" maxlength="15" value="${p.contato_telefone || ''}"></div>
              </div>
            </div>

            <div class="form-card mb-3">
              <h3><i class="fas fa-bed"></i> Dados de Internação</h3>
              <div class="info-grid">
                <div class="mb-1"><label class="form-label">Data de Entrada *</label><input type="date" class="form-control" id="data_entrada" value="${p.data_entrada || ''}" required></div>
                <div class="mb-1"><label class="form-label">Quarto</label><input type="text" class="form-control" id="quarto" value="${p.quarto || ''}"></div>
                <div class="mb-1"><label class="form-label">Tipo de Acomodação</label><select class="form-select" id="tipo_acomodacao"><option value="">Selecione</option><option value="Individual" ${p.tipo_acomodacao==='Individual'?'selected':''}>Individual</option><option value="Enfermaria" ${p.tipo_acomodacao==='Enfermaria'?'selected':''}>Enfermaria</option><option value="Apartamento" ${p.tipo_acomodacao==='Apartamento'?'selected':''}>Apartamento</option></select></div>
                <div class="mb-1"><label class="form-label">Responsável Legal</label><input type="text" class="form-control" id="responsavel_legal" value="${Utils.escapeHtml(p.responsavel_legal || '')}"></div>
                <div class="mb-1"><label class="form-label">Status</label><select class="form-select" id="status"><option value="ativo" ${p.status==='ativo'?'selected':''}>Ativo</option><option value="alta" ${p.status==='alta'?'selected':''}>Alta</option><option value="obito" ${p.status==='obito'?'selected':''}>Óbito</option></select></div>
              </div>
            </div>

            <div class="form-card mb-3">
              <h3><i class="fas fa-heartbeat"></i> Condição de Saúde</h3>
              <div class="info-grid">
                <div class="mb-1"><label class="form-label">Diagnóstico Principal *</label><input type="text" class="form-control" id="diagnostico_principal" value="${Utils.escapeHtml(p.diagnostico_principal || '')}" required></div>
                <div class="mb-1"><label class="form-label">Diagnósticos Secundários</label><input type="text" class="form-control" id="diagnosticos_secundarios" value="${Utils.escapeHtml(p.diagnosticos_secundarios || '')}"></div>
                <div class="mb-1"><label class="form-label">Alergias</label><input type="text" class="form-control" id="alergias" value="${Utils.escapeHtml(p.alergias || '')}"></div>
                <div class="mb-1"><label class="form-label">Medicamentos em Uso</label><textarea class="form-control" id="medicamentos" rows="3">${Utils.escapeHtml(p.medicamentos || '')}</textarea></div>
                <div class="mb-1"><label class="form-label">Medicamento Controlado</label><select class="form-select" id="medicamento_controlado"><option value="nao" ${p.medicamento_controlado==='nao'?'selected':''}>Não</option><option value="sim" ${p.medicamento_controlado==='sim'?'selected':''}>Sim</option></select></div>
                <div class="mb-1"><label class="form-label">Histórico de Cirurgias</label><textarea class="form-control" id="historico_cirurgias" rows="2">${Utils.escapeHtml(p.historico_cirurgias || '')}</textarea></div>
                <div class="mb-1"><label class="form-label">Internações Anteriores</label><textarea class="form-control" id="historico_internacoes" rows="2">${Utils.escapeHtml(p.historico_internacoes || '')}</textarea></div>
                <div class="mb-1"><label class="form-label">Doenças Crônicas</label><input type="text" class="form-control" id="doencas_cronicas" value="${Utils.escapeHtml(p.doencas_cronicas || '')}"></div>
              </div>
            </div>

            <div class="form-card mb-3">
              <h3><i class="fas fa-stethoscope"></i> Acompanhamento</h3>
              <div class="info-grid">
                <div class="mb-1"><label class="form-label">Responsável pelo Acompanhamento</label><input type="text" class="form-control" id="responsavel_acompanhamento" value="${Utils.escapeHtml(p.responsavel_acompanhamento || '')}"></div>
                <div class="mb-1"><label class="form-label">Observações</label><textarea class="form-control" id="observacoes" rows="4">${Utils.escapeHtml(p.observacoes || '')}</textarea></div>
              </div>
            </div>

            <div class="form-card mb-3">
              <h3><i class="fas fa-paperclip"></i> Documentos / Anexos</h3>
              <div id="areaUpload" style="border:2px dashed var(--border); border-radius:12px; padding:32px; text-align:center; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
                <input type="file" id="inputArquivo" multiple accept=".pdf,.jpg,.jpeg,.png,.webp,.doc,.docx" style="display:none;">
                <div id="uploadPlaceholder" onclick="document.getElementById('inputArquivo').click()">
                  <i class="fas fa-cloud-upload-alt" style="font-size:36px; color:var(--accent); margin-bottom:12px;"></i>
                  <p style="font-weight:600; margin-bottom:4px;">Arraste arquivos ou clique para anexar</p>
                  <p style="font-size:12px; color:var(--text-light);">PDF, JPG, PNG, WebP ou DOC/DOCX — Máximo 10MB</p>
                </div>
                <div id="arquivoPreview" style="display:none;"></div>
              </div>
              <div id="barraProgresso" style="display:none; margin-top:16px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                  <span id="textoUpload" style="font-size:13px;">Enviando...</span>
                  <span id="porcentUpload" style="font-size:13px; font-weight:600;">0%</span>
                </div>
                <div style="background:#edf2f7; border-radius:8px; height:8px; overflow:hidden;">
                  <div id="barraAnimacao" style="background:var(--accent); height:100%; width:0%; border-radius:8px; transition:width 0.3s;"></div>
                </div>
              </div>
              <div id="listaAnexos" style="margin-top:16px;"></div>
            </div>

            <div style="display:flex; gap:12px; justify-content:flex-end;">
              <a href="paciente-ficha.html?id=${p.id}" class="btn btn-outline"><i class="fas fa-times"></i> Cancelar</a>
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar Alterações</button>
            </div>
          </form>
        `;

        // Máscaras
        document.getElementById('cpf').addEventListener('input', (e) => {
          let v = e.target.value.replace(/\D/g, '').substring(0, 11);
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
          e.target.value = v;
        });

        ['telefone', 'contato_telefone'].forEach(id => {
          document.getElementById(id).addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '').substring(0, 11);
            if (v.length === 11) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            else if (v.length === 10) v = v.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            e.target.value = v;
          });
        });

        document.getElementById('endereco_cep').addEventListener('input', (e) => {
          let v = e.target.value.replace(/\D/g, '').substring(0, 8);
          v = v.replace(/(\d{5})(\d)/, '$1-$2');
          e.target.value = v;
        });

        document.getElementById('formEditar').addEventListener('submit', async (e) => {
          e.preventDefault();
          const dados = {};
          const campos = [
            'nome', 'cpf', 'data_nascimento', 'sexo', 'estado_civil', 'naturalidade',
            'telefone', 'email', 'endereco_rua', 'endereco_bairro', 'endereco_cidade',
            'endereco_cep', 'contato_nome', 'contato_parentesco', 'contato_telefone',
            'data_entrada', 'quarto', 'tipo_acomodacao', 'responsavel_legal', 'status',
            'diagnostico_principal', 'diagnosticos_secundarios', 'alergias', 'medicamentos',
            'medicamento_controlado', 'historico_cirurgias', 'historico_internacoes', 'doencas_cronicas',
            'responsavel_acompanhamento', 'observacoes'
          ];
          campos.forEach(c => { dados[c] = document.getElementById(c).value.trim(); });

          if (!dados.nome || !dados.data_nascimento || !dados.sexo || !dados.data_entrada || !dados.diagnostico_principal) {
            Utils.mostrarToast('Preencha os campos obrigatórios.', 'error');
            return;
          }

          await DB.editarPaciente(id, dados);
          Utils.mostrarToast('Paciente atualizado com sucesso!');
          setTimeout(() => { window.location.href = `paciente-ficha.html?id=${id}`; }, 800);
        });

        // === ANEXOS / UPLOAD ===
        const icones = { 'application/pdf': 'fa-file-pdf', 'image/jpeg': 'fa-file-image', 'image/png': 'fa-file-image', 'image/webp': 'fa-file-image' };

        document.getElementById('inputArquivo').addEventListener('change', function() {
          const arquivos = this.files;
          if (!arquivos.length) return;

          const iconesSelecionados = Array.from(arquivos).map(a => {
            const icone = icones[a.type] || 'fa-file';
            return `<div style="display:flex; align-items:center; gap:8px; padding:6px 0;">
              <i class="fas ${icone}" style="font-size:16px; color:var(--accent);"></i>
              <span style="font-size:13px; font-weight:600;">${Utils.escapeHtml(a.name)}</span>
              <span style="font-size:11px; color:var(--text-light);">(${R2.formatarTamanho(a.size)})</span>
            </div>`;
          }).join('');

          document.getElementById('uploadPlaceholder').style.display = 'none';
          document.getElementById('arquivoPreview').style.display = 'block';
          document.getElementById('arquivoPreview').innerHTML = `
            <div style="text-align:left;">${iconesSelecionados}</div>
            <div style="display:flex; gap:8px; justify-content:center; margin-top:16px;">
              <button type="button" class="btn btn-sm btn-outline" onclick="cancelarUpload()">
                <i class="fas fa-times"></i> Cancelar
              </button>
              <button type="button" class="btn btn-sm btn-success" onclick="salvarArquivo()">
                <i class="fas fa-save"></i> Salvar
              </button>
            </div>
          `;
        });

        window.cancelarUpload = function() {
          document.getElementById('inputArquivo').value = '';
          document.getElementById('uploadPlaceholder').style.display = '';
          document.getElementById('arquivoPreview').style.display = 'none';
        };

        window.salvarArquivo = async function() {
          const input = document.getElementById('inputArquivo');
          const arquivos = input.files;
          if (!arquivos.length) return;

          const barra = document.getElementById('barraProgresso');
          const texto = document.getElementById('textoUpload');
          const pct = document.getElementById('porcentUpload');
          const animacao = document.getElementById('barraAnimacao');

          cancelarUpload();
          barra.style.display = 'block';

          for (let i = 0; i < arquivos.length; i++) {
            const arquivo = arquivos[i];
            texto.textContent = `Enviando ${arquivo.name}...`;
            pct.textContent = `${Math.round(((i + 1) / arquivos.length) * 100)}%`;
            animacao.style.width = `${((i + 1) / arquivos.length) * 100}%`;

            try {
              R2.validarArquivo(arquivo);
              console.log('[FAAM] Upload iniciado:', arquivo.name, arquivo.type, arquivo.size);
              const resultado = await R2.upload(id, arquivo);
              console.log('[FAAM] Upload concluído:', resultado);
              Auditoria.registrar('Documento anexado', 'pacientes', `${arquivo.name} ao paciente`);
            } catch (err) {
              console.error('[FAAM] Erro no upload:', err);
              Utils.mostrarToast(`Erro: ${err.message}`, 'error');
            }
          }

          texto.textContent = 'Concluído!';
          setTimeout(() => { barra.style.display = 'none'; animacao.style.width = '0%'; }, 1500);
          input.value = '';

          // Espera 1s antes de recarregar a lista (R2 pode ter delay)
          setTimeout(() => carregarAnexos(), 1000);
        };

        window.removerAnexo = async function(key, nome) {
          if (!Utils.confirmar(`Remover o documento "${nome}"?`)) return;
          try {
            await fetch(`https://faam-upload.jhonjunn.workers.dev/delete?key=${encodeURIComponent(key)}`, { method: 'DELETE' });
            Auditoria.registrar('Documento removido', 'pacientes', nome);
            Utils.mostrarToast('Documento removido!');
            carregarAnexos();
          } catch (err) {
            Utils.mostrarToast(`Erro ao remover: ${err.message}`, 'error');
          }
        };

        async function carregarAnexos() {
          const container = document.getElementById('listaAnexos');
          try {
            const resp = await fetch(`https://faam-upload.jhonjunn.workers.dev/list?paciente_id=${id}`);
            const arquivos = await resp.json();

            if (!arquivos.length) {
              container.innerHTML = '<p style="color:var(--text-light); font-size:13px;">Nenhum documento anexado.</p>';
              return;
            }

            container.innerHTML = arquivos.map(a => `
              <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px;">
                <div style="display:flex; align-items:center; gap:10px; min-width:0;">
                  <i class="fas ${icones[a.tipo] || 'fa-file'}" style="font-size:20px; color:var(--accent);"></i>
                  <div style="min-width:0;">
                    <div style="font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${Utils.escapeHtml(a.nome)}</div>
                    <div style="font-size:11px; color:var(--text-light);">${R2.formatarTamanho(a.tamanho)} &middot; ${a.criado_em ? new Date(a.criado_em).toLocaleDateString('pt-BR') : '-'}</div>
                  </div>
                </div>
                <div style="display:flex; gap:6px; flex-shrink:0;">
                  <a href="https://faam-upload.jhonjunn.workers.dev/file/${a.key}" target="_blank" class="btn btn-sm btn-outline" title="Abrir">
                    <i class="fas fa-external-link-alt"></i>
                  </a>
                  <button type="button" class="btn btn-sm btn-danger" onclick="removerAnexo('${a.key}', '${Utils.escapeHtml(a.nome)}')" title="Remover">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
            `).join('');
          } catch (err) {
            container.innerHTML = '<p style="color:var(--danger); font-size:13px;">Erro ao carregar documentos.</p>';
          }
        }

        carregarAnexos();

        // Arrastar e soltar
        const areaUpload = document.getElementById('areaUpload');
        areaUpload.addEventListener('dragover', (e) => { e.preventDefault(); areaUpload.style.borderColor = 'var(--accent)'; areaUpload.style.background = '#f7fafc'; });
        areaUpload.addEventListener('dragleave', () => { areaUpload.style.borderColor = 'var(--border)'; areaUpload.style.background = ''; });
        areaUpload.addEventListener('drop', (e) => {
          e.preventDefault();
          areaUpload.style.borderColor = 'var(--border)';
          areaUpload.style.background = '';
          const input = document.getElementById('inputArquivo');
          input.files = e.dataTransfer.files;
          input.dispatchEvent(new Event('change'));
        });

      } catch (err) {
        console.error('Erro:', err);
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle" style="color:var(--warning);"></i>
            <h3>Erro ao carregar paciente</h3>
            <p>${err.message}</p>
            <a href="pacientes.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Voltar</a>
          </div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => { esperar(); });
  </script>
</body>
</html>
