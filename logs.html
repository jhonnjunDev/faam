<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://htfhfutjhlqktbzjbiuc.supabase.co wss://htfhfutjhlqktbzjbiuc.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com;">
  <title>Logs do Sistema - FAAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-pagina="logs" data-titulo="Logs do Sistema" data-breadcrumb='<a href="dashboard.html">Dashboard</a> / Logs'>

  <div class="app-layout">
    <main class="main-content">
      <div class="content-area fade-in">
        <div class="table-card mb-3">
          <div class="table-header">
            <h3><i class="fas fa-history"></i> Logs de Atividades</h3>
            <div style="display:flex; gap:8px;">
              <select class="form-select" id="filtroTipo" style="width:auto; padding:8px 12px; font-size:13px;">
                <option value="">Todos os tipos</option>
                <option value="login">Logins</option>
                <option value="paciente">Pacientes</option>
                <option value="relatorio">Relatórios</option>
                <option value="usuario">Usuários</option>
                <option value="sistema">Sistema</option>
              </select>
              <button class="btn btn-danger btn-sm" onclick="limparLogs()">
                <i class="fas fa-trash"></i> Limpar Logs
              </button>
            </div>
          </div>
        </div>

        <div class="table-card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Data/Hora</th>
                  <th>Tipo</th>
                  <th>Usuário</th>
                  <th>Ação</th>
                  <th>Detalhes</th>
                </tr>
              </thead>
              <tbody id="tabelaLogs"></tbody>
            </table>
          </div>
          <div id="estadoVazio" style="display:none; padding:40px; text-align:center; color:var(--text-light);">
            <i class="fas fa-clipboard-list" style="font-size:48px; margin-bottom:16px; opacity:0.5;"></i>
            <p>Nenhum log registrado</p>
          </div>
        </div>

        <div style="text-align:center; margin-top:24px;">
          <p style="font-size:12px; color:var(--text-light);">Desenvolvido por <strong>Jhonata</strong></p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dados-iniciais.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/logs.js"></script>
  <script>
    function aguardarPronto() {
      if (window.AuthPronto) {
        iniciarPagina();
      } else {
        setTimeout(aguardarPronto, 50);
      }
    }

    async function iniciarPagina() {
      if (!Auth.podeAcessar('logs')) {
        window.location.href = 'dashboard.html';
        return;
      }
      await carregarLogs();
    }

    document.addEventListener('DOMContentLoaded', () => { aguardarPronto(); });
  </script>
</body>
</html>
