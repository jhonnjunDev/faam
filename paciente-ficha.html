<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://htfhfutjhlqktbzjbiuc.supabase.co wss://htfhfutjhlqktbzjbiuc.supabase.co https://faam-upload.jhonjunn.workers.dev; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://faam-upload.jhonjunn.workers.dev; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://htfhfutjhlqktbzjbiuc.supabase.co https://faam-upload.jhonjunn.workers.dev;">
  <title>Ficha do Paciente - FAAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-pagina="paciente-ficha" data-titulo="Ficha do Paciente" data-breadcrumb='<a href="dashboard.html">Dashboard</a> / <a href="pacientes.html">Pacientes</a> / Ficha'>

  <div class="app-layout">
    <main class="main-content">
      <div class="content-area fade-in" id="conteudo">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Carregando ficha...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dados-iniciais.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auditoria.js"></script>
  <script src="js/r2-upload.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      function aguardarPronto() {
        if (window.AuthPronto) {
          iniciarPagina();
        } else {
          setTimeout(aguardarPronto, 50);
        }
      }

      async function iniciarPagina() {
        const id = Utils.obterParametroUrl('id');
        if (!id) {
          window.location.href = 'pacientes.html';
          return;
        }

        const paciente = await DB.obterPacientePorId(id);
        if (!paciente) {
          document.getElementById('conteudo').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-user-slash"></i>
            <h3>Paciente não encontrado</h3>
            <p>O paciente solicitado não foi encontrado no sistema.</p>
            <a href="pacientes.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Voltar</a>
          </div>`;
        return;
      }

      const idade = Utils.calcularIdade(paciente.data_nascimento);
      const relatorios = await DB.obterRelatoriosPorPaciente(id);
      const sessao = Auth.obterSessao();
      const podeEditar = Auth.podeAcessar('paciente_editar');
      const podeExcluir = sessao && (sessao.perfil === 'admin' || sessao.perfil === 'admin_master');

      const relatoriosHtml = relatorios.length > 0
        ? relatorios.slice(0, 5).map(r => `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border);">
            <div>
              ${Utils.tipoRelatorioBadge(r.tipo)}
              <span style="font-size:13px; margin-left:8px;">${Utils.formatarData(r.data)}</span>
              <span style="font-size:12px; color:var(--text-light); margin-left:8px;">${Utils.escapeHtml(r.profissional)}</span>
            </div>
            <a href="relatorio-detalhe.html?id=${r.id}" class="btn btn-sm btn-outline">
              <i class="fas fa-eye"></i>
            </a>
          </div>
        `).join('')
        : '<p style="color:var(--text-light); font-size:14px; padding:16px 0;">Nenhum relatório registrado.</p>';

      document.getElementById('conteudo').innerHTML = `
        <!-- Cabeçalho -->
        <div class="profile-header">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;">
            <div>
              <div class="profile-name">${Utils.escapeHtml(paciente.nome)}</div>
              <div class="profile-meta">
                <span><i class="fas fa-id-card"></i> ${Utils.formatarCPF(paciente.cpf)}</span>
                <span><i class="fas fa-birthday-cake"></i> ${Utils.formatarData(paciente.data_nascimento)} (${idade} anos)</span>
                <span><i class="fas fa-venus-mars"></i> ${paciente.sexo === 'M' ? 'Masculino' : 'Feminino'}</span>
                <span><i class="fas fa-bed"></i> Quarto ${paciente.quarto || '-'}</span>
              </div>
              <div style="margin-top:12px;">${Utils.statusBadge(paciente.status)}</div>
            </div>
            <div class="no-print" style="display:flex; gap:8px; flex-wrap:wrap;">
              ${podeEditar ? `<a href="paciente-editar.html?id=${paciente.id}" class="btn btn-sm" style="background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                <i class="fas fa-edit"></i> Editar
              </a>` : ''}
              <a href="relatorio-novo.html?paciente=${paciente.id}" class="btn btn-sm" style="background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                <i class="fas fa-file-medical"></i> Novo Relatório
              </a>
              <button onclick="imprimirRelatorio()" class="btn btn-sm" style="background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.3);">
                <i class="fas fa-print"></i> Imprimir
              </button>
              ${podeExcluir ? `<button onclick="excluirPaciente('${paciente.id}', '${Utils.escapeHtml(paciente.nome)}')" class="btn btn-sm" style="background:rgba(220,38,38,0.8); color:#fff; border:1px solid rgba(220,38,38,0.5);">
                <i class="fas fa-trash"></i> Excluir
              </button>` : ''}
            </div>
          </div>
        </div>

        <!-- Dados Pessoais -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-user"></i> Dados Pessoais</div>
          <div class="section-body">
            <div class="info-grid">
              <div class="info-item"><label>Nome Completo</label><div class="info-value">${Utils.escapeHtml(paciente.nome)}</div></div>
              <div class="info-item"><label>CPF</label><div class="info-value">${Utils.formatarCPF(paciente.cpf)}</div></div>
              <div class="info-item"><label>Data de Nascimento</label><div class="info-value">${Utils.formatarData(paciente.data_nascimento)} (${idade} anos)</div></div>
              <div class="info-item"><label>Sexo</label><div class="info-value">${paciente.sexo === 'M' ? 'Masculino' : 'Feminino'}</div></div>
              <div class="info-item"><label>Estado Civil</label><div class="info-value">${paciente.estado_civil || '-'}</div></div>
              <div class="info-item"><label>Naturalidade</label><div class="info-value">${paciente.naturalidade || '-'}</div></div>
              <div class="info-item"><label>Nome do Pai</label><div class="info-value">${Utils.escapeHtml(paciente.nome_pai) || '-'}</div></div>
              <div class="info-item"><label>Nome da Mãe</label><div class="info-value">${Utils.escapeHtml(paciente.nome_mae) || '-'}</div></div>
              <div class="info-item"><label>CNS</label><div class="info-value">${paciente.cns || '-'}</div></div>
            </div>
          </div>
        </div>

        <!-- Endereço -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-map-marker-alt"></i> Endereço</div>
          <div class="section-body">
            <div class="info-grid">
              <div class="info-item"><label>Rua / Avenida</label><div class="info-value">${paciente.endereco_rua || '-'}</div></div>
              <div class="info-item"><label>Bairro</label><div class="info-value">${paciente.endereco_bairro || '-'}</div></div>
              <div class="info-item"><label>Cidade</label><div class="info-value">${paciente.endereco_cidade || '-'}</div></div>
              <div class="info-item"><label>Município de Residência</label><div class="info-value">${paciente.municipio_residencia || '-'}</div></div>
              <div class="info-item"><label>CEP</label><div class="info-value">${paciente.endereco_cep || '-'}</div></div>
            </div>
          </div>
        </div>

        <!-- Contato de Emergência -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-phone-alt"></i> Contato de Emergência</div>
          <div class="section-body">
            <div class="info-grid">
              <div class="info-item"><label>Nome</label><div class="info-value">${paciente.contato_nome || '-'}</div></div>
              <div class="info-item"><label>Parentesco</label><div class="info-value">${paciente.contato_parentesco || '-'}</div></div>
              <div class="info-item"><label>Telefone</label><div class="info-value">${Utils.formatarTelefone(paciente.contato_telefone)}</div></div>
            </div>
          </div>
        </div>

        <!-- Internação -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-bed"></i> Dados de Internação</div>
          <div class="section-body">
            <div class="info-grid">
              <div class="info-item"><label>Data de Entrada</label><div class="info-value">${Utils.formatarData(paciente.data_entrada)}</div></div>
              <div class="info-item"><label>Quarto</label><div class="info-value">${paciente.quarto || '-'}</div></div>
              <div class="info-item"><label>Tipo de Acomodação</label><div class="info-value">${paciente.tipo_acomodacao || '-'}</div></div>
              <div class="info-item"><label>Responsável Legal</label><div class="info-value">${paciente.responsavel_legal || '-'}</div></div>
              <div class="info-item"><label>Status</label><div class="info-value">${Utils.statusBadge(paciente.status)}</div></div>
            </div>
          </div>
        </div>

        <!-- Saúde -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-heartbeat"></i> Condição de Saúde</div>
          <div class="section-body">
            <div class="info-grid">
              <div class="info-item"><label>Diagnóstico Principal</label><div class="info-value">${Utils.escapeHtml(paciente.diagnostico_principal)}</div></div>
              <div class="info-item"><label>Diagnósticos Secundários</label><div class="info-value">${Utils.escapeHtml(paciente.diagnosticos_secundarios) || '-'}</div></div>
              <div class="info-item"><label>Alergias</label><div class="info-value">${Utils.escapeHtml(paciente.alergias) || 'Nenhuma conhecida'}</div></div>
              <div class="info-item"><label>Doenças Crônicas</label><div class="info-value">${Utils.escapeHtml(paciente.doencas_cronicas) || '-'}</div></div>
              <div class="info-item"><label>Dependência Física</label><div class="info-value">${Utils.escapeHtml(paciente.dependencia_fisica) || '-'}</div></div>
              <div class="info-item"><label>Grau de Dependência</label><div class="info-value">${paciente.grau_dependencia ? `<span class="badge badge-info">${paciente.grau_dependencia}</span>` : '-'}</div></div>
              ${paciente.diagnostico_livre ? `
              <div class="info-item" style="grid-column: 1 / -1;">
                <label>Diagnóstico (descrição)</label>
                <div class="info-value" style="white-space:pre-wrap; background:#f7fafc; padding:12px; border-radius:8px; margin-top:4px;">${Utils.escapeHtml(paciente.diagnostico_livre)}</div>
              </div>` : ''}
            </div>
            <div style="margin-top:16px;">
              <div class="info-item">
                <label>Medicamentos em Uso</label>
                <div class="info-value" style="white-space:pre-wrap; background:#f7fafc; padding:12px; border-radius:8px; margin-top:4px;">${Utils.escapeHtml(paciente.medicamentos) || '-'}</div>
              </div>
              <div class="info-item" style="margin-top:12px;">
                <label>Medicamento Controlado</label>
                <div class="info-value">
                  ${paciente.medicamento_controlado === 'sim'
                    ? '<span class="badge badge-controle"><i class="fas fa-pills"></i> Sim - Utiliza medicação controlada</span>'
                    : '<span style="color:var(--text-light);">Não</span>'}
                </div>
              </div>
            </div>
            <div class="info-grid" style="margin-top:16px;">
              <div class="info-item">
                <label>Histórico de Cirurgias</label>
                <div class="info-value">${Utils.escapeHtml(paciente.historico_cirurgias) || '-'}</div>
              </div>
              <div class="info-item">
                <label>Internações Anteriores</label>
                <div class="info-value">${Utils.escapeHtml(paciente.historico_internacoes) || '-'}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Acompanhamento -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-stethoscope"></i> Acompanhamento</div>
          <div class="section-body">
            <div class="info-grid">
              <div class="info-item"><label>Responsável</label><div class="info-value">${Utils.escapeHtml(paciente.responsavel_acompanhamento) || '-'}</div></div>
            </div>
            ${paciente.observacoes ? `
            <div style="margin-top:16px;">
              <div class="info-item">
                <label>Observações</label>
                <div class="info-value" style="white-space:pre-wrap; background:#f7fafc; padding:12px; border-radius:8px; margin-top:4px;">${Utils.escapeHtml(paciente.observacoes)}</div>
              </div>
            </div>` : ''}
          </div>
        </div>

        <!-- Relatórios -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-file-medical"></i> Relatórios Médicos</div>
          <div class="section-body">
            ${relatoriosHtml}
          </div>
        </div>

        <!-- Plano Nutricional -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-apple-alt" style="color:var(--success);"></i> Acompanhamento Nutricional</div>
          <div class="section-body">
            <div id="conteudoNutricional"><p style="color:var(--text-light); font-size:13px;">Carregando...</p></div>
          </div>
        </div>

        <!-- Documentos / Anexos (somente visualização) -->
        <div class="info-section">
          <div class="section-title"><i class="fas fa-paperclip"></i> Documentos / Anexos</div>
          <div class="section-body">
            <div id="listaAnexos"><p style="color:var(--text-light); font-size:13px;">Carregando...</p></div>
            <p style="font-size:11px; color:var(--text-light); margin-top:8px;">Para adicionar ou remover anexos, clique em <a href="paciente-editar.html?id=${paciente.id}" style="color:var(--accent);">Editar Paciente</a>.</p>
          </div>
        </div>

        <!-- Botões -->
        <div class="no-print" style="display:flex; gap:12px; justify-content:flex-end; margin-top:24px;">
          <a href="pacientes.html" class="btn btn-outline">
            <i class="fas fa-arrow-left"></i> Voltar
          </a>
        </div>
      `;

      // Carregar anexos (somente visualização)
      const containerAnexos = document.getElementById('listaAnexos');
      if (containerAnexos) {
        try {
          const respAnexos = await fetch(`https://faam-upload.jhonjunn.workers.dev/list?paciente_id=${id}`);
          const arquivosAnexos = await respAnexos.json();
          if (!arquivosAnexos.length) {
            containerAnexos.innerHTML = '<p style="color:var(--text-light); font-size:13px;">Nenhum documento anexado.</p>';
          } else {
            const icones = { 'application/pdf': 'fa-file-pdf', 'image/jpeg': 'fa-file-image', 'image/png': 'fa-file-image', 'image/webp': 'fa-file-image' };
            containerAnexos.innerHTML = arquivosAnexos.map(a => `
              <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px;">
                <div style="display:flex; align-items:center; gap:10px; min-width:0;">
                  <i class="fas ${icones[a.tipo] || 'fa-file'}" style="font-size:20px; color:var(--accent);"></i>
                  <div style="min-width:0;">
                    <div style="font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${Utils.escapeHtml(a.nome)}</div>
                    <div style="font-size:11px; color:var(--text-light);">${R2.formatarTamanho(a.tamanho)} &middot; ${a.criado_em ? new Date(a.criado_em).toLocaleDateString('pt-BR') : '-'}</div>
                  </div>
                </div>
                <a href="https://faam-upload.jhonjunn.workers.dev/file/${a.key}" target="_blank" class="btn btn-sm btn-outline" title="Abrir">
                  <i class="fas fa-external-link-alt"></i>
                </a>
              </div>
            `).join('');
          }
        } catch (err) {
          containerAnexos.innerHTML = '<p style="color:var(--danger); font-size:13px;">Erro ao carregar documentos.</p>';
        }
      }

      // Carregar dados nutricionais
      const containerNutricional = document.getElementById('conteudoNutricional');
      if (containerNutricional) {
        try {
          let dadosNutri = [];
          if (DB.modoSupabase) {
            const { data, error } = await clientSupabase.from('nutricionista_dados').select('*').eq('paciente_id', id);
            if (error) {
              console.warn('Tabela nutricionista_dados pode não existir:', error.message);
              // Tentar ler do localStorage como fallback
              const todos = JSON.parse(localStorage.getItem('nutricionista_dados') || '[]');
              dadosNutri = todos.filter(d => d.paciente_id === id);
            } else if (data) {
              dadosNutri = data;
            }
          } else {
            const todos = JSON.parse(localStorage.getItem('nutricionista_dados') || '[]');
            dadosNutri = todos.filter(d => d.paciente_id === id);
          }

          console.log('Dados nutricionais encontrados:', dadosNutri.length, dadosNutri);

          // Buscar relatórios nutricionais também
          let relatoriosNutri = [];
          const todosRelatorios = await DB.obterRelatorios();
          relatoriosNutri = todosRelatorios.filter(r => r.paciente_id === id && r.tipo === 'nutricional').sort((a, b) => new Date(b.data) - new Date(a.data));

          if (dadosNutri.length === 0 && relatoriosNutri.length === 0) {
            containerNutricional.innerHTML = '<p style="color:var(--text-light); font-size:14px; padding:8px 0;">Nenhum registro nutricional encontrado para este paciente.</p><p style="font-size:12px; color:var(--text-light);">Cadastre dados pelo módulo <a href="nutricionista.html" style="color:var(--accent);">Nutricionista</a>.</p>';
          } else {
            const avaliacoes = dadosNutri.filter(d => d.tipo === 'avaliacao').sort((a, b) => new Date(b.data) - new Date(a.data));
            const prescricoes = dadosNutri.filter(d => d.tipo === 'prescricao').sort((a, b) => new Date(b.data) - new Date(a.data));
            const aceitacoes = dadosNutri.filter(d => d.tipo === 'aceitacao').sort((a, b) => new Date(b.data) - new Date(a.data));
            const hidratacoes = dadosNutri.filter(d => d.tipo === 'hidratacao').sort((a, b) => new Date(b.data) - new Date(a.data));
            const intercorrencias = dadosNutri.filter(d => d.tipo === 'intercorrencia').sort((a, b) => new Date(b.data) - new Date(a.data));

            console.log('Avaliações:', avaliacoes.length, 'Prescrições:', prescricoes.length, 'Aceitações:', aceitacoes.length, 'Hidratações:', hidratacoes.length, 'Intercorrências:', intercorrencias.length);

            let html = '';

            // Última avaliação
            if (avaliacoes.length > 0) {
              const ultima = avaliacoes[0];
              const imc = ultima.imc ? parseFloat(ultima.imc) : null;
              const classIMC = imc ? (imc < 18.5 ? { texto: 'Abaixo do peso', cor: '#ecc94b' } : imc < 25 ? { texto: 'Peso normal', cor: '#48bb78' } : imc < 30 ? { texto: 'Sobrepeso', cor: '#ed8936' } : { texto: 'Obesidade', cor: '#e53e3e' }) : { texto: '-', cor: '#718096' };
              const riscoCores = { 'baixo': '#48bb78', 'moderado': '#ecc94b', 'alto': '#ed8936', 'muito_alto': '#e53e3e' };
              const riscoLabels = { 'baixo': 'Baixo', 'moderado': 'Moderado', 'alto': 'Alto', 'muito_alto': 'Muito Alto' };

              html += `
                <div style="margin-bottom:16px;">
                  <h4 style="font-size:13px; color:var(--text-light); margin-bottom:12px;"><i class="fas fa-clipboard-list" style="margin-right:6px;"></i>Última Avaliação (${Utils.formatarData(ultima.data)})</h4>
                  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px;">
                    <div style="text-align:center; padding:12px; background:#f7fafc; border-radius:8px;">
                      <div style="font-size:20px; font-weight:700; color:var(--primary);">${ultima.peso || '-'} kg</div>
                      <div style="font-size:11px; color:var(--text-light);">Peso</div>
                    </div>
                    <div style="text-align:center; padding:12px; background:#f7fafc; border-radius:8px;">
                      <div style="font-size:20px; font-weight:700; color:var(--primary);">${ultima.altura || '-'} m</div>
                      <div style="font-size:11px; color:var(--text-light);">Altura</div>
                    </div>
                    <div style="text-align:center; padding:12px; background:${classIMC.cor}15; border-radius:8px;">
                      <div style="font-size:20px; font-weight:700; color:${classIMC.cor};">${imc || '-'}</div>
                      <div style="font-size:11px; color:${classIMC.cor};">${classIMC.texto}</div>
                    </div>
                    <div style="text-align:center; padding:12px; background:${riscoCores[ultima.risco_nutricional] || '#e2e8f0'}15; border-radius:8px;">
                      <div style="font-size:14px; font-weight:700; color:${riscoCores[ultima.risco_nutricional] || '#718096'};">${riscoLabels[ultima.risco_nutricional] || 'Não avaliado'}</div>
                      <div style="font-size:11px; color:var(--text-light);">Risco Nutricional</div>
                    </div>
                  </div>
                </div>`;
            }

            // Prescrição dietética ativa
            if (prescricoes.length > 0) {
              const ultimaPresc = prescricoes[0];
              const dietaLabels = { 'padrao': 'Padrão', 'diabetes': 'Diabetes', 'hipertensao': 'Hipertensão', 'renal': 'Renal', 'pasta_mole': 'Pasta Mole', 'pastosa': 'Pastosa', 'liquidida': 'Líquida', 'enteral': 'Enteral' };
              html += `
                <div style="margin-bottom:16px;">
                  <h4 style="font-size:13px; color:var(--text-light); margin-bottom:8px;"><i class="fas fa-prescription" style="margin-right:6px;"></i>Plano Alimentar Atual</h4>
                  <div style="padding:12px; background:#f0fff4; border-radius:8px; border-left:4px solid var(--success);">
                    <div style="display:flex; gap:16px; flex-wrap:wrap; font-size:13px; margin-bottom:8px;">
                      <span><strong>Dieta:</strong> ${dietaLabels[ultimaPresc.tipo_dieta] || ultimaPresc.tipo_dieta}</span>
                      ${ultimaPresc.calorias ? `<span><strong>Calorias:</strong> ${ultimaPresc.calorias} kcal</span>` : ''}
                      ${ultimaPresc.proteinas ? `<span><strong>PT:</strong> ${ultimaPresc.proteinas}g</span>` : ''}
                    </div>
                    ${ultimaPresc.cardapio ? `<div style="font-size:13px; white-space:pre-wrap; margin-top:8px; padding-top:8px; border-top:1px solid #c6f6d5;">${Utils.escapeHtml(ultimaPresc.cardapio)}</div>` : ''}
                    ${ultimaPresc.restricoes ? `<div style="font-size:12px; color:#c53030; margin-top:8px;"><strong>Restrições:</strong> ${Utils.escapeHtml(ultimaPresc.restricoes)}</div>` : ''}
                  </div>
                </div>`;
            } else {
              html += `<div style="margin-bottom:16px; padding:12px; background:#f7fafc; border-radius:8px; border-left:4px solid var(--border);"><h4 style="font-size:13px; color:var(--text-light); margin:0;"><i class="fas fa-prescription" style="margin-right:6px;"></i>Plano Alimentar: <span style="color:var(--text-light); font-weight:400;">Nenhum prescrito</span></h4></div>`;
            }

            // Alertas ativos
            const alertasAtivos = intercorrencias.filter(i => i.status !== 'resolvido');
            if (alertasAtivos.length > 0) {
              const gravidadeCores = { 'baixa': '#48bb78', 'media': '#ecc94b', 'alta': '#ed8936', 'critica': '#e53e3e' };
              html += `
                <div style="margin-bottom:16px;">
                  <h4 style="font-size:13px; color:var(--text-light); margin-bottom:8px;"><i class="fas fa-exclamation-triangle" style="color:#e53e3e; margin-right:6px;"></i>Alertas Ativos (${alertasAtivos.length})</h4>
                  ${alertasAtivos.slice(0, 3).map(a => `
                    <div style="padding:10px 12px; background:#fff5f5; border-radius:8px; border-left:4px solid ${gravidadeCores[a.gravidade] || '#e53e3e'}; margin-bottom:8px;">
                      <div style="font-size:12px; font-weight:600; color:${gravidadeCores[a.gravidade] || '#e53e3e'};">${a.tipo_intercorrencia || 'Alerta'} - ${a.gravidade?.toUpperCase() || 'MÉDIA'}</div>
                      <div style="font-size:13px; margin-top:4px;">${Utils.escapeHtml(Utils.truncar(a.descricao, 100))}</div>
                      <div style="font-size:11px; color:var(--text-light); margin-top:4px;">${Utils.formatarData(a.data)}</div>
                    </div>
                  `).join('')}
                </div>`;
            }

            // Resumo rápido de aceitação e hidratação
            if (aceitacoes.length > 0) {
              const mediaAceitacao = Math.round(aceitacoes.slice(0, 7).reduce((s, a) => s + (parseInt(a.percentual) || 0), 0) / Math.min(aceitacoes.length, 7));
              html += `
                <div style="margin-bottom:8px; padding:10px 12px; background:#f0fff4; border-radius:8px;">
                  <span style="font-size:13px;"><i class="fas fa-check-circle" style="margin-right:6px; color:var(--success);"></i><strong>Aceitação alimentar média:</strong> ${mediaAceitacao}%</span>
                </div>`;
            } else {
              html += `<div style="margin-bottom:8px; padding:10px 12px; background:#f7fafc; border-radius:8px; border-left:4px solid var(--border);"><span style="font-size:13px; color:var(--text-light);"><i class="fas fa-check-circle" style="margin-right:6px;"></i>Aceitação alimentar: <strong>Nenhum registro</strong></span></div>`;
            }

            if (hidratacoes.length > 0) {
              const ultimaHidr = hidratacoes[0];
              html += `
                <div style="margin-bottom:8px; padding:10px 12px; background:#ebf8ff; border-radius:8px;">
                  <span style="font-size:13px;"><i class="fas fa-tint" style="margin-right:6px; color:#4299e1;"></i><strong>Última hidratação:</strong> ${ultimaHidr.volume || 0} ml / ${ultimaHidr.meta || 2000} ml</span>
                </div>`;
            } else {
              html += `<div style="margin-bottom:8px; padding:10px 12px; background:#f7fafc; border-radius:8px; border-left:4px solid var(--border);"><span style="font-size:13px; color:var(--text-light);"><i class="fas fa-tint" style="margin-right:6px;"></i>Hidratação: <strong>Nenhum registro</strong></span></div>`;
            }

            // Relatórios nutricionais
            if (relatoriosNutri.length > 0) {
              html += `
                <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">
                  <h4 style="font-size:13px; color:var(--text-light); margin-bottom:8px;"><i class="fas fa-file-medical" style="margin-right:6px;"></i>Relatórios Nutricionais</h4>
                  ${relatoriosNutri.slice(0, 5).map(r => `
                    <div style="padding:10px 12px; background:#f0fff4; border-radius:8px; border-left:4px solid var(--success); margin-bottom:8px;">
                      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                        <span style="font-size:12px; font-weight:600; color:var(--success);">${r.profissional || 'Nutricionista'}</span>
                        <span style="font-size:11px; color:var(--text-light);">${Utils.formatarData(r.data)}</span>
                      </div>
                      <div style="font-size:13px;">${Utils.escapeHtml(Utils.truncar(r.descricao, 150))}</div>
                      <a href="relatorio-detalhe.html?id=${r.id}" style="font-size:11px; color:var(--accent); margin-top:4px; display:inline-block;">Ver relatório completo →</a>
                    </div>
                  `).join('')}
                </div>`;
            }

            containerNutricional.innerHTML = html;
          }
        } catch (err) {
          console.error('Erro ao carregar dados nutricionais:', err);
          containerNutricional.innerHTML = '<p style="color:var(--danger); font-size:13px;">Erro ao carregar dados nutricionais.</p>';
        }
      }
      }

      aguardarPronto();

      // Função para excluir paciente (admin apenas)
      window.excluirPaciente = async function(id, nome) {
        if (!Utils.confirmar(`Deseja realmente excluir o paciente "${nome}"?\n\nEsta ação não pode ser desfeita.`)) return;
        const senha = prompt('Digite sua senha de administrador para confirmar a exclusão:');
        if (!senha) return;
        const sessao = Auth.obterSessao();
        const usuarios = await Auth.obterUsuarios();
        const usuario = usuarios.find(u => u.email === sessao.email);
        const hashDigitado = await Auth._hashCodigo(senha);
        if (usuario && usuario.codigo_hash !== hashDigitado) {
          Utils.mostrarToast('Senha incorreta! Exclusão cancelada.', 'error');
          return;
        }
        const resultado = await DB.excluirPaciente(id);
        if (resultado !== false) {
          Utils.mostrarToast('Paciente excluído com sucesso!');
          setTimeout(() => window.location.href = 'pacientes.html', 1000);
        } else {
          Utils.mostrarToast('Erro ao excluir paciente.', 'error');
        }
      };

      // Função para imprimir relatório formatado
      window.imprimirRelatorio = function() {
        const id = Utils.obterParametroUrl('id');
        if (!id) return;

        DB.obterPacientePorId(id).then(async (p) => {
          if (!p) return;

          const idade = Utils.calcularIdade(p.data_nascimento);
          const sessao = Auth.obterSessao();
          const nomeProfissional = sessao ? sessao.nome : 'Profissional';
          const dataAtual = new Date().toLocaleDateString('pt-BR');

          // Buscar dados nutricionais
          let dadosNutri = [];
          if (DB.modoSupabase) {
            const { data } = await clientSupabase.from('nutricionista_dados').select('*').eq('paciente_id', p.id);
            if (data) dadosNutri = data;
          }
          const avaliacoes = dadosNutri.filter(d => d.tipo === 'avaliacao').sort((a, b) => new Date(b.data) - new Date(a.data));
          const prescricoes = dadosNutri.filter(d => d.tipo === 'prescricao').sort((a, b) => new Date(b.data) - new Date(a.data));

          let nutricionalHtml = '';
          if (avaliacoes.length > 0) {
            const a = avaliacoes[0];
            const imc = a.imc || '-';
            nutricionalHtml += '<div style="margin-bottom:8px;"><strong>Última Avaliação:</strong> ' + Utils.formatarData(a.data) + '</div>';
            nutricionalHtml += '<div style="display:flex; gap:16px; margin-bottom:8px;">';
            nutricionalHtml += '<span><strong>Peso:</strong> ' + (a.peso || '-') + ' kg</span>';
            nutricionalHtml += '<span><strong>Altura:</strong> ' + (a.altura || '-') + ' m</span>';
            nutricionalHtml += '<span><strong>IMC:</strong> ' + imc + '</span>';
            nutricionalHtml += '<span><strong>Risco:</strong> ' + (a.risco_nutricional || '-') + '</span>';
            nutricionalHtml += '</div>';
          }
          if (prescricoes.length > 0) {
            const dietaLabels = { 'padrao': 'Padrão', 'diabetes': 'Diabetes', 'hipertensao': 'Hipertensão', 'renal': 'Renal', 'pasta_mole': 'Pasta Mole', 'pastosa': 'Pastosa', 'liquidida': 'Líquida', 'enteral': 'Enteral' };
            const pr = prescricoes[0];
            nutricionalHtml += '<div><strong>Dieta Atual:</strong> ' + (dietaLabels[pr.tipo_dieta] || pr.tipo_dieta || '-') + (pr.calorias ? ' (' + pr.calorias + ' kcal)' : '') + '</div>';
          }

          const html = `
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>Relatório - ${Utils.escapeHtml(p.nome)}</title>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
            <style>
              @page { size: A4; margin: 12mm; }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: 'Segoe UI', Arial, sans-serif; color: #2d3748; line-height: 1.4; font-size: 12px; }
              .header { background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%); color: #fff; padding: 16px 24px; margin-bottom: 16px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
              .header h1 { font-size: 18px; }
              .header .meta { font-size: 11px; opacity: 0.85; text-align: right; }
              .section { margin-bottom: 14px; }
              .section-title { font-size: 13px; font-weight: 700; color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
              .section-title i { color: #3182ce; }
              .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
              .grid.two { grid-template-columns: repeat(2, 1fr); }
              .item { background: #f8fafc; padding: 6px 10px; border-radius: 4px; border-left: 3px solid #e2e8f0; }
              .item.highlight { border-left-color: #3182ce; background: #ebf8ff; }
              .item.danger { border-left-color: #e53e3e; background: #fff5f5; }
              .item.full { grid-column: 1 / -1; }
              .item label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #718096; margin-bottom: 2px; font-weight: 600; }
              .item .val { font-size: 12px; font-weight: 600; }
              .item .val.red { color: #c53030; }
              .pre { white-space: pre-wrap; font-size: 11px; line-height: 1.4; }
              .footer { margin-top: 20px; padding-top: 10px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 10px; color: #718096; }
              .footer .sig { text-align: center; padding-top: 30px; border-top: 1px solid #2d3748; min-width: 160px; }
              @media print { body { font-size: 11px; } .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .item { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
            </style>
          </head>
          <body>
            <div class="header">
              <div><h1>Relatório do Paciente</h1><div style="font-size:12px; opacity:0.85;">FAAM - Sistema de Gestão Médica</div></div>
              <div class="meta"><div>Data: ${dataAtual}</div><div>Documento Confidencial</div></div>
            </div>

            <div class="section">
              <div class="section-title"><i class="fas fa-user"></i> Dados Pessoais</div>
              <div class="grid">
                <div class="item highlight"><label>Nome Completo</label><div class="val">${Utils.escapeHtml(p.nome)}</div></div>
                <div class="item"><label>CNS</label><div class="val">${p.cns || '-'}</div></div>
                <div class="item"><label>Data de Nascimento</label><div class="val">${Utils.formatarData(p.data_nascimento)} (${idade} anos)</div></div>
                <div class="item"><label>Sexo</label><div class="val">${p.sexo === 'M' ? 'Masculino' : 'Feminino'}</div></div>
              </div>
            </div>

            <div class="section">
              <div class="section-title"><i class="fas fa-heartbeat" style="color:#e53e3e;"></i> Condição de Saúde</div>
              <div class="grid two">
                <div class="item danger"><label>Diagnóstico Principal</label><div class="val">${Utils.escapeHtml(p.diagnostico_principal) || '-'}</div></div>
                <div class="item"><label>Diagnósticos Secundários</label><div class="val">${Utils.escapeHtml(p.diagnosticos_secundarios) || '-'}</div></div>
              </div>
              <div class="grid" style="margin-top:6px;">
                <div class="item"><label>Alergias</label><div class="val red">${Utils.escapeHtml(p.alergias) || 'Nenhuma conhecida'}</div></div>
                <div class="item"><label>Doenças Crônicas</label><div class="val">${Utils.escapeHtml(p.doencas_cronicas) || '-'}</div></div>
                <div class="item"><label>Dependência Física</label><div class="val">${Utils.escapeHtml(p.dependencia_fisica) || '-'}</div></div>
              </div>
              ${p.diagnostico_livre ? '<div class="grid" style="margin-top:6px;"><div class="item full"><label>Diagnóstico (descrição)</label><div class="val pre">' + Utils.escapeHtml(p.diagnostico_livre) + '</div></div></div>' : ''}
            </div>

            <div class="section">
              <div class="section-title"><i class="fas fa-pills" style="color:#38a169;"></i> Medicamentos em Uso</div>
              <div class="grid">
                <div class="item full"><label>Lista de Medicamentos</label><div class="val pre">${Utils.escapeHtml(p.medicamentos) || '-'}</div></div>
                ${p.medicamento_controlado === 'sim' ? '<div class="item"><label>Controlado</label><div class="val" style="color:#d69e2e;"><i class="fas fa-pills"></i> Sim</div></div>' : ''}
              </div>
            </div>

            <div class="section">
              <div class="section-title"><i class="fas fa-history" style="color:#d69e2e;"></i> Histórico Médico</div>
              <div class="grid two">
                <div class="item"><label>Histórico de Cirurgias</label><div class="val">${Utils.escapeHtml(p.historico_cirurgias) || '-'}</div></div>
                <div class="item"><label>Internações Anteriores</label><div class="val">${Utils.escapeHtml(p.historico_internacoes) || '-'}</div></div>
              </div>
            </div>

            ${nutricionalHtml ? '<div class="section"><div class="section-title"><i class="fas fa-apple-alt" style="color:#38a169;"></i> Acompanhamento Nutricional</div><div style="background:#f0fff4; padding:8px 12px; border-radius:6px; border-left:3px solid #38a169;">' + nutricionalHtml + '</div></div>' : ''}

            ${p.observacoes ? '<div class="section"><div class="section-title"><i class="fas fa-stethoscope"></i> Observações</div><div style="background:#f8fafc; padding:8px 12px; border-radius:6px;"><div class="pre">' + Utils.escapeHtml(p.observacoes) + '</div></div></div>' : ''}

            <div class="footer">
              <div><div>FAAM - Sistema de Gestão Médica</div><div>Documento gerado em ${dataAtual}</div></div>
              <div class="sig"><div style="font-weight:600; color:#2d3748;">${Utils.escapeHtml(nomeProfissional)}</div></div>
            </div>

            <script>window.onload = function() { window.print(); }<\/script>
          </body>
          </html>`;

          const win = window.open('', '_blank');
          win.document.write(html);
          win.document.close();
        });
      };
    });
  </script>
</body>
</html>
