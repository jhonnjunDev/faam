<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://htfhfutjhlqktbzjbiuc.supabase.co wss://htfhfutjhlqktbzjbiuc.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com;">
  <title>Pacientes - FAAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-pagina="pacientes" data-titulo="Pacientes" data-breadcrumb='<a href="dashboard.html">Dashboard</a> / Pacientes'>

  <div class="app-layout">
    <main class="main-content">
      <div class="content-area fade-in">
        <div class="table-card mb-3">
          <div class="table-header">
            <div class="search-bar" style="flex:1">
              <input type="text" class="form-control" id="busca" placeholder="Buscar por nome, CPF ou quarto...">
              <button class="btn btn-primary" onclick="filtrar()"><i class="fas fa-search"></i> Buscar</button>
              <button class="btn btn-outline" onclick="limparFiltros()"><i class="fas fa-times"></i> Limpar</button>
            </div>
            <a href="paciente-novo.html" class="btn btn-success no-print" id="btnNovo">
              <i class="fas fa-user-plus"></i> Novo Paciente
            </a>
          </div>
          <div class="filter-bar">
            <select class="form-select" id="filtroStatus" onchange="filtrar()">
              <option value="">Todos os status</option>
              <option value="ativo">Ativo</option>
              <option value="alta">Alta</option>
              <option value="obito">Óbito</option>
            </select>
            <select class="form-select" id="filtroSexo" onchange="filtrar()">
              <option value="">Todos os sexos</option>
              <option value="M">Masculino</option>
              <option value="F">Feminino</option>
            </select>
            <input type="text" class="form-control" id="filtroQuarto" placeholder="Quarto" style="max-width:100px" oninput="filtrar()">
            <select class="form-select" id="filtroControlado" onchange="filtrar()">
              <option value="">Todos</option>
              <option value="sim">Controlado</option>
              <option value="nao">Não Controlado</option>
            </select>
          </div>
        </div>

        <div class="table-card">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Paciente</th>
                  <th>CPF</th>
                  <th>Idade</th>
                  <th>Quarto</th>
                  <th>Status</th>
                  <th>Desde</th>
                  <th class="text-right no-print">Ações</th>
                </tr>
              </thead>
              <tbody id="tabelaPacientes"></tbody>
            </table>
          </div>
          <div id="estadoVazio" style="display:none">
            <div class="empty-state">
              <i class="fas fa-users"></i>
              <h3>Nenhum paciente encontrado</h3>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dados-iniciais.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auditoria.js"></script>
  <script>
    async function filtrar() {
      const btnBuscar = document.querySelector('.search-bar .btn-primary');
      const tbody = document.getElementById('tabelaPacientes');
      const vazio = document.getElementById('estadoVazio');
      try {
        if (btnBuscar) {
          btnBuscar.disabled = true;
          btnBuscar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando...';
        }
        const termo = document.getElementById('busca').value;
        const filtros = {
          status: document.getElementById('filtroStatus').value,
          sexo: document.getElementById('filtroSexo').value,
          quarto: document.getElementById('filtroQuarto').value,
          medicamento_controlado: document.getElementById('filtroControlado').value
        };
        console.log('[DEBUG-BUSCA] termo:', JSON.stringify(termo), 'filtros:', JSON.stringify(filtros), 'modoSupabase:', DB.modoSupabase);
        const pacientes = await DB.buscarPacientes(termo, filtros);
        console.log('[DEBUG-BUSCA] resultado:', pacientes.length, 'pacientes');
        renderizarTabela(pacientes);
      } catch (e) {
        console.error('Erro ao buscar pacientes:', e);
        tbody.innerHTML = '';
        vazio.style.display = 'block';
        vazio.querySelector('h3').textContent = 'Erro ao carregar pacientes';
      } finally {
        if (btnBuscar) {
          btnBuscar.disabled = false;
          btnBuscar.innerHTML = '<i class="fas fa-search"></i> Buscar';
        }
      }
    }

    function limparFiltros() {
      document.getElementById('busca').value = '';
      document.getElementById('filtroStatus').value = '';
      document.getElementById('filtroSexo').value = '';
      document.getElementById('filtroQuarto').value = '';
      document.getElementById('filtroControlado').value = '';
      filtrar();
    }

    function renderizarTabela(pacientes) {
      const tbody = document.getElementById('tabelaPacientes');
      const vazio = document.getElementById('estadoVazio');
      const sessao = Auth.obterSessao();
      const isAdmin = sessao && (sessao.perfil === 'admin' || sessao.perfil === 'admin_master');
      if (pacientes.length === 0) { tbody.innerHTML = ''; vazio.style.display = 'block'; return; }
      vazio.style.display = 'none';
      tbody.innerHTML = pacientes.map(p => `
        <tr class="cursor-pointer" onclick="window.location.href='paciente-ficha.html?id=${p.id}'">
          <td>
            <div style="display:flex; align-items:center; gap:10px;">
              <div style="width:36px; height:36px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;">${Utils.obterIniciais(p.nome)}</div>
              <div>
                <div style="font-weight:600; font-size:14px;">
                  ${Utils.escapeHtml(p.nome)}
                  ${p.sexo === 'F' ? '<span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#ec4899; margin-left:6px; vertical-align:middle;" title="Feminino"></span>' : ''}
                  ${p.medicamento_controlado === 'sim' ? '<span class="badge badge-controle" style="margin-left:6px; font-size:10px;"><i class="fas fa-pills"></i> Controlado</span>' : ''}
                </div>
                <div style="font-size:12px; color:var(--text-light)">${p.sexo === 'M' ? 'Masculino' : 'Feminino'}</div>
              </div>
            </div>
          </td>
          <td>${Utils.formatarCPF(p.cpf)}</td>
          <td>${Utils.calcularIdade(p.data_nascimento)} anos</td>
          <td>${p.quarto || '-'}</td>
          <td>${Utils.statusBadge(p.status)}</td>
          <td>${Utils.formatarData(p.data_entrada)}</td>
          <td class="text-right no-print">
            <div style="display:flex; gap:6px; justify-content:flex-end;">
              <a href="paciente-ficha.html?id=${p.id}" class="btn btn-sm btn-outline" onclick="event.stopPropagation()"><i class="fas fa-eye"></i></a>
              ${isAdmin ? `<button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); excluirPacienteLista('${p.id}', '${Utils.escapeHtml(p.nome)}')" title="Excluir"><i class="fas fa-trash"></i></button>` : ''}
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function excluirPacienteLista(id, nome) {
      if (!Utils.confirmar(`Deseja realmente excluir o paciente "${nome}"?\n\nEsta ação não pode ser desfeita.`)) return;
      const senha = prompt('Digite sua senha de administrador para confirmar a exclusão:');
      if (!senha) return;
      const sessao = Auth.obterSessao();
      const usuarios = await Auth.obterUsuarios();
      const usuario = usuarios.find(u => u.email === sessao.email);
      const hashDigitado = await Auth._hashCodigo(senha);
      if (usuario && usuario.codigo_hash !== hashDigitado) {
        Utils.mostrarToast('Senha incorreta! Exclusão cancelada.', 'error');
        return;
      }
      const resultado = await DB.excluirPaciente(id);
      if (resultado !== false) {
        Utils.mostrarToast('Paciente excluído com sucesso!');
        filtrar();
      } else {
        Utils.mostrarToast('Erro ao excluir paciente.', 'error');
      }
    }

    function esperar() {
      if (!window.AuthPronto) {
        setTimeout(esperar, 50);
        return;
      }
      if (Auth.estaAutenticado()) {
        if (!Auth.podeAcessar('pacientes')) { document.getElementById('btnNovo').style.display = 'none'; }
        document.getElementById('busca').addEventListener('keyup', e => { if (e.key === 'Enter') filtrar(); });
        filtrar();
      } else {
        window.location.href = 'index.html';
      }
    }

    document.addEventListener('DOMContentLoaded', () => { esperar(); });
  </script>
</body>
</html>
