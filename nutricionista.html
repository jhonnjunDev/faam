<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://htfhfutjhlqktbzjbiuc.supabase.co wss://htfhfutjhlqktbzjbiuc.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com;">
  <title>Nutricionista - FAAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-pagina="nutricionista" data-titulo="Nutricionista" data-breadcrumb='<a href="dashboard.html">Dashboard</a> / Nutricionista'>

  <div class="app-layout">
    <main class="main-content">
      <div class="content-area fade-in">

        <!-- Seleção de Paciente -->
        <div class="section-card" style="margin-bottom:20px;">
          <div class="section-body" style="padding:16px 20px;">
            <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
              <div style="flex:1; min-width:200px;">
                <label class="form-label">Selecione o Paciente</label>
                <select class="form-select" id="selPaciente" onchange="aoMudarPaciente()">
                  <option value="">Busque e selecione um paciente...</option>
                </select>
              </div>
              <div id="infoPaciente" style="display:none; font-size:13px; color:var(--text-light); padding-top:22px;">
                <span id="infoPacienteTexto"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Conteúdo: aparece depois de selecionar paciente -->
        <div id="conteudoPrincipal" style="display:none;">

          <!-- Botões de ação rápida -->
          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
            <button class="btn btn-success" onclick="abrirForm('avaliacao')"><i class="fas fa-clipboard-check"></i> Nova Avaliação</button>
            <button class="btn btn-primary" onclick="abrirForm('prescricao')"><i class="fas fa-utensils"></i> Prescrever Dieta</button>
            <button class="btn btn-outline" onclick="abrirForm('aceitacao')"><i class="fas fa-check"></i> Registrar Aceitação</button>
            <button class="btn btn-outline" onclick="abrirForm('hidratacao')"><i class="fas fa-tint"></i> Registrar Hidratação</button>
            <button class="btn btn-danger" onclick="abrirForm('intercorrencia')"><i class="fas fa-exclamation-triangle"></i> Alerta</button>
            <button class="btn btn-outline" onclick="abrirForm('relatorio')"><i class="fas fa-file-medical"></i> Relatório</button>
            <button class="btn btn-danger btn-sm" id="btnApagarHistorico" onclick="apagarHistoricoNutricional()" style="margin-left:auto;"><i class="fas fa-trash-alt"></i> Apagar Histórico</button>
          </div>

          <!-- Formulário (escondido por padrão) -->
          <div id="areaForm" class="section-card" style="display:none; margin-bottom:20px;">
            <div class="section-header">
              <span id="formTitulo">Nova Avaliação</span>
              <button onclick="fecharForm()" style="margin-left:auto; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-light);">&times;</button>
            </div>
            <div class="section-body" id="corpoForm">
              <!-- Preenchido dinamicamente -->
            </div>
          </div>

          <!-- Resumo Rápido -->
          <div id="resumoRapido" class="section-card" style="margin-bottom:20px;">
            <div class="section-header"><i class="fas fa-chart-line"></i> Resumo Nutricional</div>
            <div class="section-body" id="corpoResumo">
              <p class="text-muted">Carregando...</p>
            </div>
          </div>

          <!-- Histórico -->
          <div class="section-card">
            <div class="section-header"><i class="fas fa-history"></i> Histórico Completo</div>
            <div class="section-body" id="corpoHistorico">
              <p class="text-muted">Nenhum registro encontrado.</p>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dados-iniciais.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auditoria.js"></script>
  <style>
    .section-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .section-header { background: #f7fafc; padding: 14px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .section-body { padding: 20px; }
    .resumo-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .resumo-item:last-child { border-bottom:none; }
    .resumo-label { font-size:13px; color:var(--text-light); }
    .resumo-valor { font-size:14px; font-weight:600; }
    .historico-item { padding:12px 0; border-bottom:1px solid var(--border); }
    .historico-item:last-child { border-bottom:none; }
    .historico-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .historico-tipo { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
    .historico-data { font-size:12px; color:var(--text-light); }
    .historico-body { font-size:13px; color:var(--text); }
    .tag { display:inline-block; padding:3px 8px; border-radius:12px; font-size:11px; font-weight:600; }
    .tag-verde { background:#c6f6d5; color:#276749; }
    .tag-amarelo { background:#fefcbf; color:#975a16; }
    .tag-vermelho { background:#fed7d7; color:#c53030; }
    .tag-azul { background:#bee3f8; color:#2b6cb0; }
    .tag-cinza { background:#e2e8f0; color:#718096; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px; }
    .form-full { grid-column:1/-1; }
    @media (max-width:600px) { .form-row, .form-row-3 { grid-template-columns:1fr; } }
  </style>
  <script>
    let pacienteAtual = null;
    let todosDados = [];

    // ===== INICIALIZAÇÃO =====
    async function iniciar() {
      if (!window.AuthPronto) { setTimeout(iniciar, 50); return; }
      const sessao = Auth.obterSessao();
      if (!sessao) { window.location.href = 'index.html'; return; }
      if (sessao.perfil !== 'nutricionista' && sessao.perfil !== 'admin' && sessao.perfil !== 'admin_master') {
        Utils.mostrarToast('Acesso não autorizado.', 'error');
        window.location.href = 'dashboard.html';
        return;
      }
      await carregarPacientes();
    }

    async function carregarPacientes() {
      const pacientes = await DB.obterPacientes();
      const sel = document.getElementById('selPaciente');
      const ativos = pacientes.filter(p => p.status === 'ativo').sort((a, b) => a.nome.localeCompare(b.nome));
      sel.innerHTML = '<option value="">Busque e selecione um paciente...</option>' +
        ativos.map(p => `<option value="${p.id}">${p.nome} - Quarto ${p.quarto || 'S/Q'}</option>`).join('');
    }

    async function aoMudarPaciente() {
      const id = document.getElementById('selPaciente').value;
      if (!id) {
        pacienteAtual = null;
        document.getElementById('conteudoPrincipal').style.display = 'none';
        return;
      }
      pacienteAtual = await DB.obterPacientePorId(id);
      if (!pacienteAtual) return;

      document.getElementById('infoPaciente').style.display = 'block';
      document.getElementById('infoPacienteTexto').textContent = `${pacienteAtual.nome} - ${Utils.calcularIdade(pacienteAtual.data_nascimento)} anos - Quarto ${pacienteAtual.quarto || 'S/Q'}`;
      document.getElementById('conteudoPrincipal').style.display = 'block';

      await carregarDadosNutricionais();
    }

    // ===== DADOS NUTRICIONAIS =====
    async function carregarDadosNutricionais() {
      if (!pacienteAtual) return;
      if (DB.modoSupabase) {
        const { data, error } = await clientSupabase.from('nutricionista_dados').select('*').eq('paciente_id', pacienteAtual.id);
        todosDados = error ? [] : (data || []);
      } else {
        const todos = JSON.parse(localStorage.getItem('nutricionista_dados') || '[]');
        todosDados = todos.filter(d => d.paciente_id === pacienteAtual.id);
      }
      renderizarResumo();
      renderizarHistorico();
      atualizarEstatisticas();
    }

    function renderizarResumo() {
      const container = document.getElementById('corpoResumo');
      const avaliacoes = todosDados.filter(d => d.tipo === 'avaliacao').sort((a, b) => new Date(b.data) - new Date(a.data));
      const prescricoes = todosDados.filter(d => d.tipo === 'prescricao').sort((a, b) => new Date(b.data) - new Date(a.data));
      const aceitacoes = todosDados.filter(d => d.tipo === 'aceitacao').sort((a, b) => new Date(b.data) - new Date(a.data));
      const hidratacoes = todosDados.filter(d => d.tipo === 'hidratacao').sort((a, b) => new Date(b.data) - new Date(a.data));
      const alertas = todosDados.filter(d => d.tipo === 'intercorrencia' && d.status !== 'resolvido');

      let html = '';

      // Última avaliação
      if (avaliacoes.length > 0) {
        const a = avaliacoes[0];
        const imc = a.imc ? parseFloat(a.imc) : null;
        const classIMC = !imc ? 'tag-cinza' : imc < 18.5 ? 'tag-amarelo' : imc < 25 ? 'tag-verde' : imc < 30 ? 'tag-amarelo' : 'tag-vermelho';
        const labelIMC = !imc ? '-' : imc < 18.5 ? 'Abaixo do peso' : imc < 25 ? 'Normal' : imc < 30 ? 'Sobrepeso' : 'Obesidade';
        const riscoLabels = { 'baixo': 'Baixo', 'moderado': 'Moderado', 'alto': 'Alto', 'muito_alto': 'Muito Alto' };
        const riscoClass = { 'baixo': 'tag-verde', 'moderado': 'tag-amarelo', 'alto': 'tag-vermelho', 'muito_alto': 'tag-vermelho' };

        html += `
          <div class="resumo-item"><span class="resumo-label"><i class="fas fa-weight" style="margin-right:6px;"></i>Último Peso</span><span class="resumo-valor">${a.peso || '-'} kg</span></div>
          <div class="resumo-item"><span class="resumo-label"><i class="fas fa-ruler-vertical" style="margin-right:6px;"></i>Altura</span><span class="resumo-valor">${a.altura || '-'} m</span></div>
          <div class="resumo-item"><span class="resumo-label"><i class="fas fa-calculator" style="margin-right:6px;"></i>IMC</span><span class="resumo-valor"><span class="tag ${classIMC}">${imc || '-'} - ${labelIMC}</span></span></div>
          <div class="resumo-item"><span class="resumo-label"><i class="fas fa-exclamation-circle" style="margin-right:6px;"></i>Risco Nutricional</span><span class="resumo-valor"><span class="tag ${riscoClass[a.risco_nutricional] || 'tag-cinza'}">${riscoLabels[a.risco_nutricional] || 'Não avaliado'}</span></span></div>
          <div class="resumo-item"><span class="resumo-label"><i class="fas fa-calendar" style="margin-right:6px;"></i>Data da Avaliação</span><span class="resumo-valor">${Utils.formatarData(a.data)}</span></div>`;
      } else {
        html += '<p style="color:var(--text-light); font-size:13px;">Nenhuma avaliação nutricional registrada.</p>';
      }

      // Dieta atual
      if (prescricoes.length > 0) {
        const p = prescricoes[0];
        const dietaLabels = { 'padrao': 'Padrão', 'diabetes': 'Diabetes', 'hipertensao': 'Hipertensão', 'renal': 'Renal', 'pasta_mole': 'Pasta Mole', 'pastosa': 'Pastosa', 'liquidida': 'Líquida', 'enteral': 'Enteral' };
        html += `<div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border);">`;
        html += `<div class="resumo-item"><span class="resumo-label"><i class="fas fa-utensils" style="margin-right:6px;"></i>Dieta Atual</span><span class="resumo-valor"><span class="tag tag-azul">${dietaLabels[p.tipo_dieta] || p.tipo_dieta}</span></span></div>`;
        if (p.calorias) html += `<div class="resumo-item"><span class="resumo-label"><i class="fas fa-fire" style="margin-right:6px;"></i>Calorias</span><span class="resumo-valor">${p.calorias} kcal</span></div>`;
        html += `</div>`;
      }

      // Alertas
      if (alertas.length > 0) {
        html += `<div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border);">`;
        html += `<div style="padding:10px 12px; background:#fff5f5; border-radius:8px; border-left:4px solid #e53e3e;">`;
        html += `<div style="font-size:12px; font-weight:600; color:#e53e3e;"><i class="fas fa-bell" style="margin-right:6px;"></i>${alertas.length} Alerta(s) Ativo(s)</div>`;
        alertas.slice(0, 2).forEach(a => {
          html += `<div style="font-size:12px; margin-top:4px; color:#718096;">• ${Utils.escapeHtml(Utils.truncar(a.descricao, 80))}</div>`;
        });
        html += `</div></div>`;
      }

      container.innerHTML = html;
    }

    function renderizarHistorico() {
      const container = document.getElementById('corpoHistorico');
      if (todosDados.length === 0) {
        container.innerHTML = '<p style="color:var(--text-light); font-size:13px;">Nenhum registro nutricional para este paciente.</p>';
        return;
      }

      const tipoConfig = {
        'avaliacao': { label: 'Avaliação Nutricional', icon: 'fa-clipboard-check', cor: '#38a169' },
        'relatorio': { label: 'Relatório', icon: 'fa-file-medical', cor: '#3182ce' },
        'prescricao': { label: 'Prescrição Dietética', icon: 'fa-utensils', cor: '#d69e2e' },
        'aceitacao': { label: 'Aceitação Alimentar', icon: 'fa-check-circle', cor: '#38a169' },
        'hidratacao': { label: 'Hidratação', icon: 'fa-tint', cor: '#4299e1' },
        'intercorrencia': { label: 'Alerta/Intercorrência', icon: 'fa-exclamation-triangle', cor: '#e53e3e' }
      };

      const ordenados = [...todosDados].sort((a, b) => new Date(b.data) - new Date(a.data));

      container.innerHTML = ordenados.map(d => {
        const cfg = tipoConfig[d.tipo] || { label: d.tipo, icon: 'fa-file', cor: '#718096' };
        let detalhes = '';

        if (d.tipo === 'avaliacao') {
          detalhes = `<span class="tag ${d.imc && parseFloat(d.imc) < 25 ? 'tag-verde' : 'tag-amarelo'}">IMC: ${d.imc || '-'}</span> <span class="tag ${d.risco_nutricional === 'alto' || d.risco_nutricional === 'muito_alto' ? 'tag-vermelho' : d.risco_nutricional === 'moderado' ? 'tag-amarelo' : 'tag-verde'}">Risco: ${d.risco_nutricional || '-'}</span> ${d.peso ? d.peso + 'kg' : ''} ${d.altura ? d.altura + 'm' : ''}`;
        } else if (d.tipo === 'prescricao') {
          const dietaLabels = { 'padrao': 'Padrão', 'diabetes': 'Diabetes', 'hipertensao': 'Hipertensão', 'renal': 'Renal', 'pasta_mole': 'Pasta Mole', 'pastosa': 'Pastosa', 'liquidida': 'Líquida', 'enteral': 'Enteral' };
          detalhes = `<span class="tag tag-azul">${dietaLabels[d.tipo_dieta] || d.tipo_dieta}</span> ${d.calorias ? d.calorias + ' kcal' : ''}`;
          if (d.cardapio) detalhes += `<div style="margin-top:4px; font-size:12px; color:var(--text-light);">${Utils.escapeHtml(Utils.truncar(d.cardapio, 120))}</div>`;
        } else if (d.tipo === 'aceitacao') {
          const refLabels = { 'cafe_manha': 'Café da manhã', 'lanche_manha': 'Lanche manhã', 'almoco': 'Almoço', 'lanche_tarde': 'Lanche tarde', 'jantar': 'Jantar', 'ceia': 'Ceia' };
          const pct = parseInt(d.percentual) || 0;
          const corBarra = pct >= 75 ? '#48bb78' : pct >= 50 ? '#ed8936' : '#e53e3e';
          detalhes = `${refLabels[d.refeicao] || d.refeicao} - <strong>${pct}%</strong> aceito`;
          if (d.alimentos_nao_aceitos) detalhes += `<div style="font-size:11px; color:#e53e3e; margin-top:2px;">Não aceitou: ${Utils.escapeHtml(d.alimentos_nao_aceitos)}</div>`;
        } else if (d.tipo === 'hidratacao') {
          const vol = parseInt(d.volume) || 0;
          const meta = parseInt(d.meta) || 2000;
          detalhes = `<strong>${vol} ml</strong> / ${meta} ml (${Math.round(vol/meta*100)}%) - Via: ${d.via || 'Oral'}`;
        } else if (d.tipo === 'intercorrencia') {
          const gravCores = { 'baixa': 'tag-verde', 'media': 'tag-amarelo', 'alto': 'tag-vermelho', 'critica': 'tag-vermelho' };
          detalhes = `<span class="tag ${gravCores[d.gravidade] || 'tag-cinza'}">${d.gravidade || 'Média'}</span> <span class="tag ${d.status === 'resolvido' ? 'tag-verde' : 'tag-amarelo'}">${d.status || 'Pendente'}</span>`;
          if (d.descricao) detalhes += `<div style="margin-top:4px; font-size:12px;">${Utils.escapeHtml(Utils.truncar(d.descricao, 120))}</div>`;
        } else if (d.tipo === 'relatorio') {
          const tipoLabels = { 'avaliacao_inicial': 'Avaliação Inicial', 'reavaliacao': 'Reavaliação', 'evolucao': 'Evolução', 'interconsulta': 'Interconsulta', 'alta': 'Alta' };
          detalhes = `<span class="tag tag-azul">${tipoLabels[d.tipo_relatorio] || d.tipo_relatorio || '-'}</span>`;
          if (d.descricao) detalhes += `<div style="margin-top:4px; font-size:12px; color:var(--text-light);">${Utils.escapeHtml(Utils.truncar(d.descricao, 120))}</div>`;
        }

        return `
          <div class="historico-item">
            <div class="historico-header">
              <span class="historico-tipo" style="color:${cfg.cor};"><i class="fas ${cfg.icon}" style="margin-right:6px;"></i>${cfg.label}</span>
              <div style="display:flex; align-items:center; gap:8px;">
                <span class="historico-data">${Utils.formatarData(d.data)}</span>
                <button class="btn btn-sm btn-danger" onclick="excluirRegistro('${d.id}')" title="Excluir"><i class="fas fa-trash" style="font-size:11px;"></i></button>
              </div>
            </div>
            <div class="historico-body">${detalhes}</div>
          </div>`;
      }).join('');
    }

    // ===== FORMULÁRIOS =====
    function abrirForm(tipo) {
      const area = document.getElementById('areaForm');
      const titulo = document.getElementById('formTitulo');
      const corpo = document.getElementById('corpoForm');
      area.style.display = 'block';
      area.scrollIntoView({ behavior: 'smooth', block: 'start' });

      const hoje = new Date().toISOString().split('T')[0];
      const nomeP = pacienteAtual?.nome || '';

      if (tipo === 'avaliacao') {
        titulo.innerHTML = '<i class="fas fa-clipboard-check" style="color:#38a169;"></i> Nova Avaliação Nutricional';
        corpo.innerHTML = `
          <div class="form-row">
            <div><label class="form-label">Peso (kg) *</label><input type="number" class="form-control" id="f_peso" step="0.1" oninput="calcIMC()" placeholder="Ex: 70.5"></div>
            <div><label class="form-label">Altura (m) *</label><input type="number" class="form-control" id="f_altura" step="0.01" oninput="calcIMC()" placeholder="Ex: 1.75"></div>
          </div>
          <div class="form-row">
            <div><label class="form-label">IMC</label><div id="f_imc" style="padding:10px; background:#f7fafc; border-radius:8px; font-weight:700; font-size:18px; text-align:center;">-</div></div>
            <div><label class="form-label">Risco Nutricional *</label>
              <select class="form-select" id="f_risco">
                <option value="">Selecione...</option>
                <option value="baixo">Baixo</option>
                <option value="moderado">Moderado</option>
                <option value="alto">Alto</option>
                <option value="muito_alto">Muito Alto</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div><label class="form-label">Estado Nutricional</label>
              <select class="form-select" id="f_estado">
                <option value="">Selecione...</option>
                <option value="eutrofico">Eutrófico</option>
                <option value="desnutricao">Desnutrição</option>
                <option value="sobrepeso">Sobrepeso</option>
                <option value="obesidade">Obesidade</option>
              </select>
            </div>
            <div><label class="form-label">Data *</label><input type="date" class="form-control" id="f_data" value="${hoje}"></div>
          </div>
          <div style="margin-bottom:12px;"><label class="form-label">Observações</label><textarea class="form-control" id="f_obs" rows="2" placeholder="Observações..."></textarea></div>
          <div style="text-align:right;"><button class="btn btn-success" onclick="salvarForm('avaliacao')"><i class="fas fa-save"></i> Salvar</button></div>`;
      } else if (tipo === 'prescricao') {
        titulo.innerHTML = '<i class="fas fa-utensils" style="color:#d69e2e;"></i> Prescrição Dietética';
        corpo.innerHTML = `
          <div class="form-row">
            <div><label class="form-label">Tipo de Dieta *</label>
              <select class="form-select" id="f_dieta">
                <option value="">Selecione...</option>
                <option value="padrao">Padrão</option>
                <option value="diabetes">Diabetes</option>
                <option value="hipertensao">Hipertensão</option>
                <option value="renal">Renal</option>
                <option value="pasta_mole">Pasta Mole</option>
                <option value="pastosa">Pastosa</option>
                <option value="liquidida">Líquida</option>
                <option value="enteral">Enteral</option>
              </select>
            </div>
            <div><label class="form-label">Calorias (kcal)</label><input type="number" class="form-control" id="f_calorias" placeholder="Ex: 1800"></div>
          </div>
          <div class="form-row-3">
            <div><label class="form-label">Proteínas (g)</label><input type="number" class="form-control" id="f_pt" step="0.1" placeholder="75"></div>
            <div><label class="form-label">Carboidratos (g)</label><input type="number" class="form-control" id="f_cho" step="0.1" placeholder="225"></div>
            <div><label class="form-label">Lipídios (g)</label><input type="number" class="form-control" id="f_lip" step="0.1" placeholder="60"></div>
          </div>
          <div class="form-row">
            <div class="form-full"><label class="form-label">Restrições Alimentares</label><input type="text" class="form-control" id="f_restricoes" placeholder="Ex: Sem glúten, sem lactose..."></div>

                <option value="lanche_manha">Lanche da Manhã</option>
                <option value="almoco">Almoço</option>
                <option value="lanche_tarde">Lanche da Tarde</option>
                <option value="jantar">Jantar</option>
                <option value="ceia">Ceia</option>
              </select>
            </div>
            <div><label class="form-label">Percentual Aceito (%) *</label><input type="number" class="form-control" id="f_percentual" min="0" max="100" placeholder="Ex: 80"></div>
          </div>
          <div class="form-row">
            <div class="form-full"><label class="form-label">Alimentos Não Aceitos</label><input type="text" class="form-control" id="f_nao_aceitos" placeholder="Ex: Feijão, salada..."></div>
          </div>
          <div class="form-row">
            <div><label class="form-label">Data *</label><input type="date" class="form-control" id="f_data" value="${hoje}"></div>
            <div><label class="form-label">Observações</label><input type="text" class="form-control" id="f_obs" placeholder="Observações..."></div>
          </div>
          <div style="text-align:right;"><button class="btn btn-success" onclick="salvarForm('aceitacao')"><i class="fas fa-save"></i> Salvar</button></div>`;
      } else if (tipo === 'hidratacao') {
        titulo.innerHTML = '<i class="fas fa-tint" style="color:#4299e1;"></i> Registrar Hidratação';
        corpo.innerHTML = `
          <div class="form-row-3">
            <div><label class="form-label">Volume (ml) *</label><input type="number" class="form-control" id="f_volume" placeholder="Ex: 1500"></div>
            <div><label class="form-label">Meta (ml)</label><input type="number" class="form-control" id="f_meta" placeholder="2000" value="2000"></div>
            <div><label class="form-label">Via</label>
              <select class="form-select" id="f_via">
                <option value="oral">Oral</option>
                <option value="enteral">Enteral</option>
                <option value="parenteral">Parenteral</option>
                <option value="mista">Mista</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div><label class="form-label">Data *</label><input type="date" class="form-control" id="f_data" value="${hoje}"></div>
            <div><label class="form-label">Observações</label><input type="text" class="form-control" id="f_obs" placeholder="Observações..."></div>
          </div>
          <div style="text-align:right;"><button class="btn btn-success" onclick="salvarForm('hidratacao')"><i class="fas fa-save"></i> Salvar</button></div>`;
      } else if (tipo === 'intercorrencia') {
        titulo.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#e53e3e;"></i> Nova Intercorrência / Alerta';
        corpo.innerHTML = `
          <div class="form-row">
            <div><label class="form-label">Tipo *</label>
              <select class="form-select" id="f_tipo_intern">
                <option value="intercorrencia">Intercorrência</option>
                <option value="alerta">Alerta</option>
                <option value="restricao">Restrição Alimentar</option>
                <option value="reacao_adversa">Reação Adversa</option>
              </select>
            </div>
            <div><label class="form-label">Gravidade *</label>
              <select class="form-select" id="f_gravidade">
                <option value="baixa">Baixa</option>
                <option value="media">Média</option>
                <option value="alta">Alta</option>
                <option value="critica">Crítica</option>
              </select>
            </div>
          </div>
          <div style="margin-bottom:12px;"><label class="form-label">Descrição *</label><textarea class="form-control" id="f_descricao" rows="3" placeholder="Descreva o que aconteceu..."></textarea></div>
          <div style="margin-bottom:12px;"><label class="form-label">Conduta Tomada</label><textarea class="form-control" id="f_conduta" rows="2" placeholder="O que foi feito..."></textarea></div>
          <div class="form-row">
            <div><label class="form-label">Data/Hora *</label><input type="datetime-local" class="form-control" id="f_data" value="${new Date().toISOString().slice(0, 16)}"></div>

              <select class="form-select" id="f_status">
                <option value="pendente">Pendente</option>

      } else if (tipo === 'relatorio') {
        titulo.innerHTML = '<i class="fas fa-file-medical" style="color:#3182ce;"></i> Novo Relatório Nutricional';
        corpo.innerHTML = `
          <div class="form-row">
            <div><label class="form-label">Tipo *</label>
              <select class="form-select" id="f_tipo_rel">
                <option value="avaliacao_inicial">Avaliação Inicial</option>
                <option value="reavaliacao">Reavaliação</option>
                <option value="evolucao">Evolução</option>
                <option value="interconsulta">Interconsulta</option>
                <option value="alta">Alta</option>
              </select>
            </div>

          <div style="margin-bottom:12px;"><label class="form-label">Descrição *</label><textarea class="form-control" id="f_descricao" rows="5" placeholder="Descreva o relatório..."></textarea></div>
          <div style="margin-bottom:12px;"><label class="form-label">Conclusão</label><textarea class="form-control" id="f_conclusao" rows="2" placeholder="Conclusões e recomendações..."></textarea></div>
          <div style="text-align:right;"><button class="btn btn-success" onclick="salvarForm('relatorio')"><i class="fas fa-save"></i> Salvar</button></div>`;

    function fecharForm() {
      document.getElementById('areaForm').style.display = 'none';
    }

    function calcIMC() {
      const peso = parseFloat(document.getElementById('f_peso')?.value);
      const altura = parseFloat(document.getElementById('f_altura')?.value);
      const el = document.getElementById('f_imc');
      if (!el) return;
      if (!peso || !altura || altura <= 0) { el.textContent = '-'; el.style.background = '#f7fafc'; return; }
      const imc = (peso / (altura * altura)).toFixed(1);
      const cls = imc < 18.5 ? { t: 'Abaixo do peso', c: '#ecc94b' } : imc < 25 ? { t: 'Normal', c: '#48bb78' } : imc < 30 ? { t: 'Sobrepeso', c: '#ed8936' } : { t: 'Obesidade', c: '#e53e3e' };
      el.textContent = `${imc} - ${cls.t}`;
      el.style.color = cls.c;
      el.style.background = cls.c + '15';
    }

    async function salvarForm(tipo) {
      const dados = {
        id: Utils.gerarId(),
        paciente_id: pacienteAtual.id,
        tipo: tipo,
        profissional: Auth.obterSessao()?.nome || 'Nutricionista',
        criado_em: new Date().toISOString()
      };

      if (tipo === 'avaliacao') {
        dados.peso = parseFloat(document.getElementById('f_peso').value) || null;
        dados.altura = parseFloat(document.getElementById('f_altura').value) || null;
        dados.imc = dados.peso && dados.altura ? (dados.peso / (dados.altura * dados.altura)).toFixed(1) : null;
        dados.risco_nutricional = document.getElementById('f_risco').value;
        dados.estado_nutricional = document.getElementById('f_estado').value;
        dados.data = document.getElementById('f_data').value;
        dados.observacoes = document.getElementById('f_obs').value;
        if (!dados.data || !dados.risco_nutricional) { Utils.mostrarToast('Preencha os campos obrigatórios!', 'error'); return; }
      } else if (tipo === 'prescricao') {
        dados.tipo_dieta = document.getElementById('f_dieta').value;
        dados.calorias = document.getElementById('f_calorias').value;
        dados.proteinas = document.getElementById('f_pt').value;
        dados.carboidratos = document.getElementById('f_cho').value;
        dados.lipidios = document.getElementById('f_lip').value;
        dados.restricoes = document.getElementById('f_restricoes').value;
        dados.cardapio = document.getElementById('f_cardapio').value;
        dados.data = document.getElementById('f_data').value;
        dados.status = document.getElementById('f_status').value;
        if (!dados.data || !dados.tipo_dieta || !dados.cardapio) { Utils.mostrarToast('Preencha os campos obrigatórios!', 'error'); return; }
      } else if (tipo === 'aceitacao') {
        dados.refeicao = document.getElementById('f_refeicao').value;
        dados.percentual = parseInt(document.getElementById('f_percentual').value) || 0;
        dados.alimentos_nao_aceitos = document.getElementById('f_nao_aceitos').value;
        dados.data = document.getElementById('f_data').value;
        dados.observacoes = document.getElementById('f_obs').value;
        if (!dados.data || !dados.refeicao) { Utils.mostrarToast('Preencha os campos obrigatórios!', 'error'); return; }
      } else if (tipo === 'hidratacao') {
        dados.volume = parseInt(document.getElementById('f_volume').value) || 0;
        dados.meta = parseInt(document.getElementById('f_meta').value) || 2000;
        dados.via = document.getElementById('f_via').value;
        dados.data = document.getElementById('f_data').value;
        dados.observacoes = document.getElementById('f_obs').value;
        if (!dados.data || !dados.volume) { Utils.mostrarToast('Preencha os campos obrigatórios!', 'error'); return; }
      } else if (tipo === 'intercorrencia') {
        dados.tipo_intercorrencia = document.getElementById('f_tipo_intern').value;
        dados.gravidade = document.getElementById('f_gravidade').value;
        dados.descricao = document.getElementById('f_descricao').value;
        dados.conduta = document.getElementById('f_conduta').value;
        dados.data = document.getElementById('f_data').value;
        dados.status = document.getElementById('f_status').value;
        if (!dados.data || !dados.descricao) { Utils.mostrarToast('Preencha os campos obrigatórios!', 'error'); return; }
      } else if (tipo === 'relatorio') {
        dados.tipo_relatorio = document.getElementById('f_tipo_rel').value;
        dados.data = document.getElementById('f_data').value;
        dados.descricao = document.getElementById('f_descricao').value;
        dados.conclusao = document.getElementById('f_conclusao').value;
        if (!dados.data || !dados.descricao) { Utils.mostrarToast('Preencha os campos obrigatórios!', 'error'); return; }
      }

      let ok;
      if (DB.modoSupabase) {
        const { error } = await clientSupabase.from('nutricionista_dados').insert(dados);
        ok = !error;
      } else {
        const todos = JSON.parse(localStorage.getItem('nutricionista_dados') || '[]');
        todos.push(dados);
        localStorage.setItem('nutricionista_dados', JSON.stringify(todos));
        ok = true;
      }

      if (ok) {
        Utils.mostrarToast('Salvo com sucesso!');
        fecharForm();
        await carregarDadosNutricionais();
      } else {
        Utils.mostrarToast('Erro ao salvar.', 'error');
      }
    }

    // ===== EXCLUIR =====
    async function excluirRegistro(id) {
      if (!Utils.confirmar('Excluir este registro?')) return;
      if (DB.modoSupabase) {
        await clientSupabase.from('nutricionista_dados').delete().eq('id', id);
      } else {
        const todos = JSON.parse(localStorage.getItem('nutricionista_dados') || '[]');
        localStorage.setItem('nutricionista_dados', JSON.stringify(todos.filter(d => d.id !== id)));
      }
      Utils.mostrarToast('Registro excluído!');
      await carregarDadosNutricionais();
    }

    async function apagarHistoricoNutricional() {
      if (!pacienteAtual) return;
      if (!Utils.confirmar(`Apagar TODO o histórico nutricional de "${pacienteAtual.nome}"?\n\nEsta ação não pode ser desfeita.`)) return;

      let apagados = 0;
      for (const d of todosDados) {
        if (DB.modoSupabase) {
          await clientSupabase.from('nutricionista_dados').delete().eq('id', d.id);
        }
        apagados++;
      }
      if (!DB.modoSupabase) {
        const todos = JSON.parse(localStorage.getItem('nutricionista_dados') || '[]');
        localStorage.setItem('nutricionista_dados', JSON.stringify(todos.filter(d => d.paciente_id !== pacienteAtual.id)));
      }

      Utils.mostrarToast(`${apagados} registro(s) apagado(s)!`);
      await carregarDadosNutricionais();
    }

    // ===== ESTATÍSTICAS =====
    async function atualizarEstatisticas() {
      // Estatísticas globais (pode ser omitido ou mantido simples)
    }

    document.addEventListener('DOMContentLoaded', () => { iniciar(); });
  </script>
